description: >
  Too many requests. Some operations may apply request limits; when this
  response is returned, wait before retrying.
content:
  application/json:
    schema:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          description: Human-readable explanation of why the request was rejected
      example:
        message: Too many requests. Please retry later.
