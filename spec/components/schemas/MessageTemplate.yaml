title: MessageTemplate
required:
  - content
type: object
properties:
  content:
    type: string
    description: The message content.  This supports template placeholders.
  metadata:
    type: object
    description: >-
      Message metadata.  This will be supplied to URL shortener and UG.  Max 10
      keys per campaign.
  rich_link:
    $ref: ./RichLink.yaml
  delivery_report:
    type: boolean
    description: Request a delivery report for the sent message
