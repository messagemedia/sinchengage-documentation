title: scheduledsummaryrequest
type: object
description: A scheduled summary report request
required:
  - period
  - timezone
properties:
  period:
    $ref: ./ReportPeriod.yaml
  timezone:
    type: string
    example: Australia/Sydney
    description: The standard timezone name
  direction:
    $ref: ../MessageDirection.yaml
  source:
    type: string
    example: '+61555555555'
    description: The source phone number.
  destination:
    type: string
    example: '+61555555555'
    description: The destination phone number.
  metadata_key:
    type: string
    example: broadcastId
    description: Filter results for messages that include a metadata key.
  metadata_value:
    type: string
    example: ABC
    description: >-
      Filter results for messages that include a metadata key containing this
      value. If this parameter is provided, the metadata_key parameter must also
      be provided.
  accounts:
    type: array
    items:
      type: string
    example:
      - Account1
      - Account2
    description: >-
      Filter results by a specific account. By default results will be returned
      for the account associated with the authentication credentials and all
      sub-accounts.
  status:
    type: array
    items:
      $ref: ../MessageStatus.yaml
    example:
      - DELIVERED
      - ENROUTE
    description: An array of message statuses.
  opt_out:
    type: string
    example: 'true'
    description: Filter the report to only include messages that triggered an opt-out.
  group_by:
    type: array
    items:
      $ref: ./GroupByField.yaml
    example:
      - DAY
      - WEEK
    description: Group results by a list of values, from the enumerable table above.
  delivery_options:
    type: array
    items:
      $ref: ../deliveryOptionsBody.yaml
    description: A list of options to configure the delivery of the report.
