title: Message
type: object
properties:
  message_id:
    type: string
    description: Unique ID of this message
    format: uuid
  format:
    $ref: ../_format-schemas.yaml#/Format
  timestamp:
    type: string
    description: Timestamp of this message
    example: '2017-02-10T16:30:00'
  delivered_timestamp:
    type: string
    description: Time that this message was delivered
    example: '2017-02-10T16:30:00'
  last_status_update:
    type: string
    description: Last time this message's status was updated
    example: '2017-02-10T16:30:00'
  direction:
    $ref: ../MessageDirection.yaml
  status:
    $ref: ../Status.yaml
  status_code:
    type: number
    description: The response code of the status
    example: 220
  status_description:
    type: string
    description: The status of the message
    example: Message delivered
  source_address:
    type: string
    example: '+61490246135'
  destination_address:
    maxLength: 15
    minLength: 1
    type: string
    description: Destination number of the message
    example: '+6149123654'
  destination_address_country:
    type: string
    description: Country of the destination address
    example: AU
  content:
    maxLength: 5000
    minLength: 1
    type: string
    description: Content of the message
    example: Hello world!
  account_id:
    type: string
    description: The ID of the account
    example: account_1
  units:
    type: number
    description: The amount of messages received
    example: 1
  billing_category:
    type: string
    description: >-
      The billing category applied to this RCS message (e.g. RCS_BASIC,
      RCS_SINGLE, RCS_RICH, RCS_RICH_MEDIA). Supported from 5/Feb/2026. This
      field is only available for RCS messages and only for messages sent on or
      after this date.
    example: RCS_BASIC
  message_type:
    $ref: ../RichMessageType.yaml
  metadata:
    type: object
    description: >-
      Metadata for the message specified as a set of key value pairs, each key
      can be up to 100 characters long and each value can be up to 256
      characters long

      ```

      {
         "myKey": "myValue",
         "anotherKey": "anotherValue"
      }

      ```
    example:
      - myKey: myValue
      - anotherKey: anotherValue
