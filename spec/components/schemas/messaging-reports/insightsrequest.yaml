title: insightsrequest
required:
  - start_date
  - end_date
  - timezone
type: object
properties:
  start_date:
    description: >-
      Start date time for report window. By default, the timezone for this
      parameter will be taken from the account settings for the account
      associated with the credentials used to make the request, or the account
      included in the Account parameter. This can be overridden using the
      timezone parameter per request. The date must be in ISO8601 format and may
      include precise time values (e.g., milliseconds).
    type: string
    example: 2022-12-12T01:01:01.001z
  end_date:
    description: >-
      End date time for report window. By default, the timezone for this
      parameter will be taken from the account settings for the account
      associated with the credentials used to make the request, or the account
      included in the Account parameter. This can be overridden using the
      timezone parameter per request. The date must be in ISO8601 format, and
      after the requested start_date and may include precise time values (e.g.,
      milliseconds).
    type: string
    example: 2022-12-14T01:01:01.001z
  timezone:
    description: The timezone of the messages to include, using the name of the region.
    type: string
    example: Australia/Sydney
  direction:
    $ref: ../MessageDirection.yaml
  source:
    description: Filter results by source address.
    type: string
    example: '+61555555555'
  sources:
    description: >-
      Filter results by multiple source addresses. This property overrides the
      `source` parameter.
    type: array
    items:
      type: string
    example:
      - '+61555555555'
      - '+614987654321'
  destination:
    description: Filter results by destination address.
    type: string
    example: '+61555555555'
  destinations:
    description: >-
      Filter results by multiple destination addresses. This property overrides
      the `destination` parameter.
    type: array
    items:
      type: string
    example:
      - '+61555555555'
      - '+614987654321'
  metadata_key:
    description: >-
      Filter results for messages that include a metadata key. Can be used
      independently for searching.
    type: string
    example: broadcastId
  metadata_value:
    description: >-
      Filter results for messages that include a metadata key containing this
      value. If this parameter is provided, the metadata_key parameter must also
      be provided. Cannot be used together with metadata_values.
    type: string
    example: ABC
  metadata_values:
    description: >-
      Filter results for messages that include a metadata key containing these
      values. Must be used together with metadata_key. Cannot be used together
      with metadata_value.
    type: array
    items:
      type: string
    example:
      - meta1
      - meta2
  accounts:
    description: >-
      Filter results by a specific account. By default results will be returned
      for the account associated with the authentication credentials and all
      sub-accounts.
    type: array
    items:
      type: string
    example:
      - account1
      - account2
  status:
    description: An array of message statuses.
    type: array
    items:
      $ref: ../MessageStatus.yaml
    example:
      - DELIVERED
      - ENROUTE
  opt_out:
    description: Filter the report to only include messages that triggered an opt-out
    type: string
    example: 'true'
  channels:
    description: >-
      Filter the report by one or more message channels. Supported from
      14/Aug/2025, and filtering by channels is available only for reports
      starting from this date.
    type: array
    items:
      type: string
      enum:
        - SMS
        - MMS
        - TTS
        - RCS
        - WHATSAPP
        - CHANNEL
    example:
      - SMS
      - WHATSAPP
  group_by:
    description: >-
      Defines available fields for grouping insights reports. COUNTRY and
      CHANNEL are supported from 14/Aug/2025, and POSTBACK_DATA is supported
      from 16/Sep/2025, with data available only from those dates onward.
    type: array
    items:
      $ref: ./GroupByInsightField.yaml
    example:
      - WEEK
      - ACCOUNT
