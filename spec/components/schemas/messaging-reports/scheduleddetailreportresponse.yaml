title: scheduleddetailreportresponse
type: object
properties:
  label:
    type: string
    example: Weekly Report
    description: The label of the report schedule
  schedule:
    $ref: ./schedule.yaml
  report:
    $ref: ./scheduleddetailrequest.yaml
  scheduled_report_id:
    type: string
    example: 43928f76-c381-4943-8619-f10460005898
    description: The ID of the scheduled report.
  message_type:
    $ref: ../MessageDirection.yaml
  report_type:
    type: string
    example: detail
  metadata:
    type: object
    description: >-
      Metadata for the message specified as a set of key value pairs, each key
      can be up to 100 characters long and each value can be up to 256
      characters long

      ```

      {
         "myKey": "myValue",
         "anotherKey": "anotherValue"
      }

      ```
    example:
      myKey: myValue
      anotherKey: anotherValue
