title: detailrequest
required:
  - start_date
  - end_date
type: object
properties:
  start_date:
    description: >-
      Start date time for report window. By default, the timezone for this
      parameter  will be taken from the account settings for the account
      associated with the  credentials used to make the request, or the account
      included in the Account parameter.  This can be overridden using the
      timezone parameter per request. The date must be in ISO8601 format.
    type: string
    example: 2022-12-12T00:00:00.000z
  end_date:
    description: >-
      End date time for report window. By default, the timezone for this
      parameter  will be taken from the account settings for the account
      associated with the  credentials used to make the request, or the account
      included in the Account parameter.  This can be overridden using the
      timezone parameter per request. The date must be in ISO8601 format, and
      after the requested start_date.
    type: string
    example: 2022-12-14T00:00:00.000z
  direction:
    $ref: ../MessageDirection.yaml
  timezone:
    description: The timezone of the messages to include, using the name of the region.
    type: string
    example: Australia/Sydney
  source:
    description: Filter results by source address.
    type: string
    example: '+61555555555'
  sources:
    description: >-
      Filter results by multiple source addresses. This property overrides the
      `source` parameter.
    type: array
    items:
      type: string
    example:
      - '+61555555555'
      - '+614987654321'
  destination:
    description: Filter results by destination address.
    type: string
    example: '+61555555555'
  destinations:
    description: >-
      Filter results by multiple destination addresses. This property overrides
      the `destination` parameter.
    type: array
    items:
      type: string
    example:
      - '+61555555555'
      - '+614987654321'
  metadata_key:
    description: Filter results for messages that include a metadata key.
    type: string
    example: broadcastId
  metadata_value:
    description: >-
      Filter results for messages that include a metadata key containing this
      value. If this parameter is provided, the metadata_key parameter must also
      be provided.
    type: string
    example: ABC
  metadata_values:
    description: >-
      Filter results for messages that include a metadata key containing these
      values. This parameter overrides the metadata_value property. If this
      parameter is provided, the metadata_key parameter must also be provided.
    type: array
    items:
      type: string
    example:
      - meta1
      - meta2
  accounts:
    description: >-
      Filter results by a specific account. By default results will be returned
      for the account associated with the authentication credentials and all
      sub-accounts.
    type: array
    items:
      type: string
    example:
      - Account1
      - Account2
  status:
    description: An array of message statuses
    type: array
    items:
      $ref: ../MessageStatus.yaml
  opt_out:
    description: Filter the report to only include messages that triggered an opt-out
    type: string
    example: 'true'
  mms_media:
    description: Filter results by mms media.
    type: string
    example: 'true'
  message_format:
    $ref: ../_format-schemas.yaml#/format
  channels:
    description: Filter the report by one or more message channels.
    type: array
    items:
      type: string
      enum:
        - SMS
        - MMS
        - TTS
        - RCS
        - WHATSAPP
        - CHANNEL
    example:
      - SMS
      - WHATSAPP
  page:
    description: Page number for paging through paginated result sets.
    type: number
    example: 0
  page_size:
    description: Number of results to return in a page for paginated result sets.
    type: number
    example: 20
