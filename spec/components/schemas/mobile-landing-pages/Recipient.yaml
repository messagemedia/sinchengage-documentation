title: Recipient
required:
  - number
type: object
properties:
  number:
    type: string
    description: The recipient phone number.  Must be E.164 with a leading '+'
  parameters:
    type: object
    description: The recipient scoped template parameters
  scheduled:
    type: string
    description: >-
      A message can be scheduled for delivery in the future by setting the
      scheduled property. The scheduled property expects a date time specified
      in ISO 8601 format. The scheduled time must be provided in UTC and be no
      more than 31 days in the future.
