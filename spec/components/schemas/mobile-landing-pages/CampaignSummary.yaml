title: CampaignSummary
required:
  - total_events
  - unique_engagements
  - event_summary
type: object
properties:
  total_events:
    type: number
    description: The total number of events record against this campaign.
  unique_engagements:
    type: number
    description: >-
      The unique number of recipients for which there exists at least one
      recorded event.
  event_summary:
    type: array
    items:
      $ref: ./EventSummary.yaml
    description: The event summary breakdown.
