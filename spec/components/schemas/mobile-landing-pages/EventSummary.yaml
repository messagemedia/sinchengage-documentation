title: EventSummary
required:
  - event
  - total_events
  - unique_recipients
type: object
properties:
  event:
    type: string
    description: >-
      The event type to which this summary is for.  See [Event
      Types](#events-types) for a list of available events.
  source:
    type: string
    description: The event source to which this summary is for, if applicable.
  total_events:
    type: number
    description: The total number of recorded events of this type and source.
  unique_recipients:
    type: number
    description: >-
      The unique number of recipients for which there exists at least one event
      of this type and source recorded.
