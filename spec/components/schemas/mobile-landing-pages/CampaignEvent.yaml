title: CampaignEvent
required:
  - campaign_id
  - recipient_id
  - number
  - event
  - timestamp
type: object
properties:
  campaign_id:
    type: string
    description: The campaign ID
  recipient_id:
    type: string
    description: The recipient ID to which this event corresponds to
  number:
    type: string
    description: The recipient's phone number
  event:
    type: string
    description: >-
      The event type.  See [Event Types](#events-types) for a list of available
      events.
  source:
    type: string
    description: >-
      The source identifier.  This identifies the element that produced the
      event.  This may not be applicable for all events.
  timestamp:
    type: string
    description: The timestamp of the event, in ISO 8601 format.
