title: DeliveryReport
type: object
properties:
  callback_url:
    type: string
    description: >-
      The URL specified as the callback URL in the original submit message
      request
    example: https://my.url.com
  date_received:
    type: string
    description: The date and time at which this delivery report was generated in UTC.
    format: date-time
    example: 11/3/2016 11:49:02 AM
  delay:
    type: integer
    description: Deprecated, no longer in use
    format: int32
    example: 0
  billing_units:
    type: integer
    description: The billing units of this report
    format: int32
    example: 1
  delivery_report_id:
    type: string
    description: Unique ID for this delivery report
    format: uuid
  message_id:
    type: string
    description: Unique ID of the original message
    format: uuid
  metadata:
    type: object
    description: Any metadata that was included in the original submit message request
  original_text:
    type: string
    description: Text of the original message.
    example: Hello back
  source_number:
    maxLength: 15
    minLength: 1
    type: string
    description: Address from which this delivery report was received
    example: '+61491570156'
  status:
    $ref: ../Status.yaml
  submitted_date:
    type: string
    description: >-
      The date and time when the message status changed in UTC. For a delivered
      DR this may indicate the time at which the message was received on the
      handset.
    format: date-time
    example: 11/3/2016 11:49:02 AM
  vendor_account_id:
    $ref: ../VendorAccountId.yaml
