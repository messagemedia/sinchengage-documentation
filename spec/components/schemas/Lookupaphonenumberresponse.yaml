title: Lookupaphonenumberresponse
required:
  - country_code
  - phone_number
  - type
  - carrier
  - result
  - imsi
  - location
type: object
properties:
  country_code:
    type: string
  phone_number:
    type: string
  type:
    type: string
  carrier:
    $ref: ./Carrier.yaml
  result:
    type: string
    example: '"OK"'
  imsi:
    type: integer
    description: A unique number identifying a GSM subscriber
    format: int64
    example: 24008
  location:
    type: integer
    description: The location of the mobile number
    format: int32
    example: 46
example:
  country_code: AU
  phone_number: '61491570156'
  type: mobile
  carrier:
    name: Telstra
  result: OK
  imsi: 24008
  location: 46
