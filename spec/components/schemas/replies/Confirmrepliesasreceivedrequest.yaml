title: Confirmrepliesasreceivedrequest
required:
  - reply_ids
type: object
properties:
  reply_ids:
    maxItems: 100
    type: array
    items:
      type: string
      format: uuid
    description: >-
      The UUID of the *reply* to be confirmed (note: not the UUID of the message
      it is in response to)
example:
  reply_ids:
    - 011dcead-6988-4ad6-a1c7-6b6c68ea628d
    - 3487b3fa-6586-4979-a233-2d1b095c7718
    - ba28e94b-c83d-4759-98e7-ff9c7edb87a1
