title: Getmessagestatusresponse
type: object
properties:
  callback_url:
    type: string
    description: URL replies and delivery reports to this message will be pushed to
    example: https://my.url.com
  content:
    maxLength: 5000
    minLength: 1
    type: string
    description: Content of the message
    example: Hello world!
  destination_number:
    maxLength: 15
    minLength: 1
    type: string
    description: Destination number of the message
    example: '+61491570156'
  delivery_report:
    type: boolean
    description: Request a delivery report for this message
    example: false
  format:
    $ref: ../_format-schemas.yaml#/Format
  message_expiry_timestamp:
    type: string
    description: Date time after which the message expires and will not be sent
    format: date-time
    example: '2016-11-03T11:49:02.807Z'
  metadata:
    type: object
    description: >-
      Metadata for the message specified as a set of key value pairs, each key
      can be up to 100 characters long and each value can be up to 256
      characters long

      ```

      {
         "myKey": "myValue",
         "anotherKey": "anotherValue"
      }

      ```
  scheduled:
    type: string
    description: Scheduled delivery date time of the message
    format: date-time
    example: '2016-11-03T11:49:02.807Z'
  source_number:
    type: string
    example: '+61491570156'
  source_number_type:
    $ref: ../SourceNumberType.yaml
  message_id:
    type: string
    description: Unique ID of this message
    format: uuid
  status:
    $ref: ../Status.yaml
