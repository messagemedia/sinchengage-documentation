post:
  security:
    - basic_auth: []
    - hmac_auth: []
  tags:
    - Replies
  summary: Confirm replies as received
  description: >-
    Mark a reply message as confirmed so it is no longer returned in check replies requests.

    The confirm replies endpoint is intended to be used in conjunction with the check replies
    endpoint

    to allow for robust processing of reply messages. Once one or more reply messages have been
    processed

    they can then be confirmed using the confirm replies endpoint so they are no longer returned in

    subsequent check replies requests.

    The confirm replies endpoint takes a list of reply IDs as follows:

    ```json

    {
        "reply_ids": [
            "011dcead-6988-4ad6-a1c7-6b6c68ea628d",
            "3487b3fa-6586-4979-a233-2d1b095c7718",
            "ba28e94b-c83d-4759-98e7-ff9c7edb87a1"
        ]
    }

    ```

    The expiry date for getting an entity is 45 days. Up to 100 replies can be confirmed in a single
    confirm replies request.
  operationId: ConfirmRepliesAsReceived
  parameters: []
  requestBody:
    description: Request body.
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/replies/Confirmrepliesasreceivedrequest.yaml
        example:
          reply_ids:
            - 011dcead-6988-4ad6-a1c7-6b6c68ea628d
            - 3487b3fa-6586-4979-a233-2d1b095c7718
            - ba28e94b-c83d-4759-98e7-ff9c7edb87a1
    required: true
  responses:
    "202":
      description: Requested replies will be marked as confirmed
      headers: {}
      content:
        text/plain:
          schema:
            type: object
            description: Requested replies will be marked as confirmed
    "400":
      description: Bad request
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/400response.yaml
    "403":
      description: Unauthorised
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/403response.yaml
    "404":
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/404response.yaml
    "429":
      $ref: ../../components/responses/TooManyRequests.yaml
  deprecated: false
