get:
  security:
    - basic_auth: []
    - hmac_auth: []
  tags:
    - Messages
  summary: Get message status
  description: |
    Retrieve the current status of a message using the message ID returned
    in the send messages end point.

    A successful request to the get message status endpoint will return a
    response body as follows:

    ```json

    {
        "format": "SMS",
        "content": "My first message!",
        "metadata": {
            "key1": "value1",
            "key2": "value2"
        },
        "message_id": "877c19ef-fa2e-4cec-827a-e1df9b5509f7",
        "callback_url": "https://my.callback.url.com",
        "delivery_report": true,
        "destination_number": "+61401760575",
        "scheduled": "2016-11-03T11:49:02.807Z",
        "source_number": "+61491570157",
        "source_number_type": "INTERNATIONAL",
        "message_expiry_timestamp": "2016-11-03T11:49:02.807Z",
        "status": "enroute"
    }

    ```

    The status property of the response indicates the current status of the
    message. See the Delivery Reports section of this documentation for more information on message
    statuses. The expiry date for getting an entity is 45 days.

    *Note: If an invalid or non existent message ID parameter is specified
    in the request, then a HTTP 404 Not Found response will be returned*
  operationId: GetMessageStatus
  parameters:
    - name: messageId
      in: path
      description: 36 character UUID.
      required: true
      style: simple
      schema:
        type: string
        example: 389dc1a8-62a4-4110-ba61-af94806c006f
      example: 389dc1a8-62a4-4110-ba61-af94806c006f
  responses:
    "200":
      description: The submitted message including the status of the message
      headers: {}
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/messages/Getmessagestatusresponse.yaml
    "403":
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/403response.yaml
    "404":
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/404response.yaml
    "429":
      $ref: ../../components/responses/TooManyRequests.yaml
put:
  security:
    - basic_auth: []
    - hmac_auth: []
  tags:
    - Messages
  summary: Cancel scheduled message
  description: >
    Cancel a scheduled message that has not yet been delivered.


    A scheduled message can be cancelled by updating the status of a message

    from ```scheduled``` to ```cancelled```. This is done by submitting a PUT request to the

    messages endpoint using the message ID as a parameter (the same endpoint used above to retrieve

    the status of a message). The expiry date for getting an entity is 45 days.


    The body of the request simply needs to contain a ```status``` property with the value set to
    ```cancelled```.


    ```json


    {
        "status": "cancelled"
    }


    ```


    *Note: Only messages with a status of scheduled can be cancelled. If an invalid or non existent
    message ID parameter is specified in the request, then a HTTP 404 Not Found response will be
    returned*
  operationId: CancelScheduledMessage
  parameters:
    - name: messageId
      in: path
      description: 36 character UUID.
      required: true
      style: simple
      schema:
        type: string
        example: 389dc1a8-62a4-4110-ba61-af94806c006f
      example: 389dc1a8-62a4-4110-ba61-af94806c006f
  requestBody:
    description: Parameters of a message to change.
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/messages/Cancelscheduledmessagerequest.yaml
        example:
          status: cancelled
    required: true
  responses:
    "200":
      description: Message status updated successfully
    "400":
      description: Bad request
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/400response.yaml
    "403":
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/403response.yaml
    "404":
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/404response.yaml
    "429":
      $ref: ../../components/responses/TooManyRequests.yaml
