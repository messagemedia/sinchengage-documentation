get:
  security:
    - basic_auth: []
    - hmac_auth: []
  tags:
    - Short Trackable Links Reports
  summary: Log summary
  description: Clicks summary report for metadata key value pair, long url and short url.
  operationId: LogSummary
  parameters:
    - name: key
      in: query
      description: ''
      style: form
      explode: true
      schema:
        type: string
    - name: value
      in: query
      description: ''
      style: form
      explode: true
      schema:
        type: string
    - name: url
      in: query
      description: ''
      style: form
      explode: true
      schema:
        type: string
    - name: recipient
      in: query
      description: ''
      style: form
      explode: true
      schema:
        type: string
    - name: page
      in: query
      description: ''
      style: form
      explode: true
      schema:
        type: number
        format: double
    - name: pageSize
      in: query
      description: ''
      style: form
      explode: true
      schema:
        type: number
        format: double
  responses:
    '200':
      description: OK
      headers: {}
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/short-trackable-links-reports/LogSummaryResult.yaml
          example:
            total_clicks: 3
            unique_clicks: 1
            total_views: 2
            unique_views: 1
            short_urls_generated: 1
            short_urls:
              - click_count: 3
                view_count: 2
                message_id: 00000000-0000-0000-0000-000000000000
                long_url: https://developers.sinch.com
                short_url: https://nxt.to/abc1234
                destination_number: 61491570157
            pagination:
              page: 1
              page_size: 100
              page_count: 3
    '400':
      description: Bad Request. Invalid data provided
    '404':
      description: Data cannot be found
    '500':
      description: System Error
  deprecated: false
