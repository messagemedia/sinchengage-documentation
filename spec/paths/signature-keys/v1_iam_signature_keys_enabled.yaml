patch:
  security:
    - basic_auth: []
    - hmac_auth: []
  tags:
    - Signature Key Management
  summary: Enable signature key
  description: >-
    Enable a signature key using the key_id returned in the ```create signature key``` endpoint.

    There is only one signature key is enabled at the one moment in time. So if you enable the new
    signature key, the old one will be disabled.


    The most basic body has the following structure:


    ```json

    {
        "key_id": "7ca628a8-08b0-4e42-aeb8-960b37049c31"
    }

    ```


    The response body of a successful PATCH request to ```enable signature key``` endpoint will
    contain the ```enabled``` properties with the value is true as follows:


    ```json

    {
        "key_id": "7ca628a8-08b0-4e42-aeb8-960b37049c31",
        "cipher": "RSA",
        "digest": "SHA224",
        "created": "2018-01-18T10:16:12.364Z",
        "enabled": true
    }

    ```


    *Note: If an invalid or non-existent key_id parameter is specified in the request, then an HTTP
    404 Not Found response will be returned*
  operationId: EnableSignatureKey
  parameters:
    - name: Accept
      in: header
      description: Requested response media type.
      required: true
      style: simple
      schema:
        type: string
        example: application/json
      example: application/json
  requestBody:
    description: Request body.
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/signature-keys/Enablesignaturekeyrequest.yaml
        example:
          key_id: 7ca628a8-08b0-4e42-aeb8-960b37049c31
    required: true
  responses:
    "200":
      description: The enabled signature key.
      headers: {}
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/signature-keys/Enablesignaturekeyresponse.yaml
          example:
            key_id: 7ca628a8-08b0-4e42-aeb8-960b37049c31
            cipher: RSA
            digest: SHA224
            created: "2018-01-18T10:16:12.364Z"
            enabled: true
    "400":
      description: Unexpected error in API call. See HTTP response body for details.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/signature-keys/Enablesignaturekey400response.yaml
          example:
            message: Bad Request
            details:
              - "/key_id: Key id cannot be null"
    "403":
      description: Unexpected error in API call. See HTTP response body for details.
      content:
        application/json:
          schema:
            $ref: >-
              ../../components/schemas/signature-keys/Disablethecurrentenabledsignaturekey.403response.yaml
          example:
            message: This feature has not been enabled in your account.
    "404":
      description: Unexpected error in API call. See HTTP response body for details.
      content:
        application/json:
          schema:
            $ref: >-
              ../../components/schemas/signature-keys/Disablethecurrentenabledsignaturekey.403response.yaml
          example:
            message: Entity not found
    "429":
      $ref: ../../components/responses/TooManyRequests.yaml
  deprecated: false
get:
  security:
    - basic_auth: []
    - hmac_auth: []
  tags:
    - Signature Key Management
  summary: Get enabled signature key
  description: >-
    Retrieve the currently enabled signature key.


    A successful request for the ```get enabled signature key``` endpoint will return a response
    body as follows:


    ```json

    {
        "key_id": "7ca628a8-08b0-4e42-aeb8-960b37049c31",
        "cipher": "RSA",
        "digest": "SHA224",
        "created": "2018-01-18T10:16:12.364Z",
        "enabled": true
    }

    ```


    *Note: If there is no enabled signature key, then an HTTP 404 Not Found response will be
    returned*
  operationId: GetEnabledSignatureKey
  responses:
    "200":
      description: The detail of signature key.
      headers: {}
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/signature-keys/Getenabledsignaturekeyresponse.yaml
          example:
            key_id: 7ca628a8-08b0-4e42-aeb8-960b37049c31
            cipher: RSA
            digest: SHA224
            created: "2018-01-18T10:16:12.364Z"
            enabled: true
    "403":
      description: Unexpected error in API call. See HTTP response body for details.
      content:
        application/json:
          schema:
            $ref: >-
              ../../components/schemas/signature-keys/Disablethecurrentenabledsignaturekey.403response.yaml
          example:
            message: This feature has not been enabled in your account.
    "404":
      description: Unexpected error in API call. See HTTP response body for details.
      content:
        application/json:
          schema:
            $ref: >-
              ../../components/schemas/signature-keys/Disablethecurrentenabledsignaturekey.403response.yaml
          example:
            message: Currently no key is enabled
    "429":
      $ref: ../../components/responses/TooManyRequests.yaml
  deprecated: false
delete:
  security:
    - basic_auth: []
    - hmac_auth: []
  tags:
    - Signature Key Management
  summary: Disable the current enabled signature key
  description: >-
    Disable the current enabled signature key.


    A successful request for the ```disable the current enabled signature key``` endpoint will
    return no content when successful.

    If there is an enabled key, it will be disabled; and the 204 status code is returned.

    If there is no key or no enabled key, the 204 status code is also returned.
  operationId: DisableTheCurrentEnabledSignatureKey
  responses:
    "204":
      description: No content.
      headers: {}
    "403":
      description: Unexpected error in API call. See HTTP response body for details.
      content:
        application/json:
          schema:
            $ref: >-
              ../../components/schemas/signature-keys/Disablethecurrentenabledsignaturekey.403response.yaml
          example:
            message: This feature has not been enabled in your account.
    "429":
      $ref: ../../components/responses/TooManyRequests.yaml
  deprecated: false
