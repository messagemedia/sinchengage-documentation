get:
  tags:
    - Signature Key Management
  summary: Get signature key detail
  description: >-
    Retrieve the current detail of a signature key using the key_id returned in
    the ```create signature key``` endpoint.


    A successful request for the ```get signature key detail``` endpoint will
    return a response body as follows:


    ```json

    {
        "key_id": "7ca628a8-08b0-4e42-aeb8-960b37049c31",
        "cipher": "RSA",
        "digest": "SHA224",
        "created": "2018-01-18T10:16:12.364Z",
        "enabled": false
    }

    ```


    *Note: If an invalid or non-existent key_id parameter is specified in the
    request, then an HTTP 404 Not Found response will be returned*
  operationId: GetSignatureKeyDetail
  parameters:
    - name: key_id
      in: path
      description: ''
      required: true
      style: simple
      schema:
        type: string
  responses:
    '200':
      description: The detail of signature key.
      headers: {}
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/signature-keys/Getsignaturekeydetailresponse.yaml
          example:
            key_id: 7ca628a8-08b0-4e42-aeb8-960b37049c31
            cipher: RSA
            digest: SHA224
            created: '2018-01-18T10:16:12.364Z'
            enabled: false
    '400':
      description: Unexpected error in API call. See HTTP response body for details.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/signature-keys/Enablesignaturekey400response.yaml
          example:
            message: Bad Request
            details:
              - key_id property value is invalid
    '403':
      description: Unexpected error in API call. See HTTP response body for details.
      content:
        application/json:
          schema:
            $ref: >-
              ../../components/schemas/signature-keys/Disablethecurrentenabledsignaturekey.403response.yaml
          example:
            message: This feature has not been enabled in your account.
    '404':
      description: Unexpected error in API call. See HTTP response body for details.
      content:
        application/json:
          schema:
            $ref: >-
              ../../components/schemas/signature-keys/Disablethecurrentenabledsignaturekey.403response.yaml
          example:
            message: Entity not found
  deprecated: false
delete:
  tags:
    - Signature Key Management
  summary: Delete signature key
  description: >-
    Delete a signature key using the key_id returned in the ```create signature
    key``` endpoint.


    A successful request for the ```delete signature key``` endpoint will return
    an empty response body.


    *Note: If an invalid or non-existent key_id parameter is specified in the
    request, then an HTTP 404 Not Found response will be returned*
  operationId: DeleteSignatureKey
  parameters:
    - name: key_id
      in: path
      description: ''
      required: true
      style: simple
      schema:
        type: string
  responses:
    '200':
      description: The signature key has been deleted.
      headers: {}
    '403':
      description: Unexpected error in API call. See HTTP response body for details.
      content:
        application/json:
          schema:
            $ref: >-
              ../../components/schemas/signature-keys/Disablethecurrentenabledsignaturekey.403response.yaml
          example:
            message: This feature has not been enabled in your account.
    '404':
      description: Unexpected error in API call. See HTTP response body for details.
      content:
        application/json:
          schema:
            $ref: >-
              ../../components/schemas/signature-keys/Disablethecurrentenabledsignaturekey.403response.yaml
          example:
            message: Entity not found
  deprecated: false
