get:
  security:
    - basic_auth: []
    - hmac_auth: []
  tags:
    - Number Authorisation
  summary: Check if one or several numbers are currently blacklisted
  description: >-
    This endpoints lists for each requested number if you are authorised (which
    means the number is not blacklisted) to send to this number.

    In the example given +61491570157 is on the blacklist.

    NOTE: We do this call for you internally no matter what. Use this endpoint
    only if you want to have some indication upfront. If you send a message
    which is on the blacklist, we issue a delivery receipt with the appropriate
    status code.
  operationId: CheckIfOneOrSeveralNumbersAreCurrentlyBlacklisted
  parameters:
    - in: path
      name: numbers
      required: true
      schema:
        type: array
        minimum: 1
        items:
          type: string
      description: >-
        one or more numbers in international format seperate by a comma, e.g.
        ```+61491570156,+61491570157```
  responses:
    '200':
      description: ''
      headers: {}
      content:
        application/json:
          schema:
            $ref: >-
              ../../components/schemas/number-authorisation/Checkifoneorseveralnumbersarecurrentlyblacklistedresponse.yaml
          example:
            uri: /v1/number_authorisation/is_authorised/+61491570156,+61491570157
            numbers:
              - number: '61491570156'
                authorised: true
              - number: '61491570157'
                authorised: false
  deprecated: false
