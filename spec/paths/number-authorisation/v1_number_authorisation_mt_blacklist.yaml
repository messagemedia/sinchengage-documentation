get:
  security:
    - basic_auth: []
    - hmac_auth: []
  tags:
    - Number Authorisation
  summary: List all blocked numbers
  description: >-
    This endpoint returns a list of 100 numbers that are on the blacklist.  There is a pagination
    token to retrieve the next 100 numbers


    In the example response the numbers `+61491570156` and `+61491570157` are on the blacklist and
    therefore will never receive any messages from you.
  operationId: ListAllBlockedNumbers
  parameters:
    - name: token
      in: query
      description: >
        Opaque pagination token from a previous response. Omit on the first request. Pass the
        returned token to retrieve the next page of up to 100 numbers.
      required: false
      schema:
        type: string
      example: eyJwYWdlIjoyfQ
  responses:
    "200":
      description: Number authorisation blacklist was returned successfully.
      content:
        application/json:
          schema:
            $ref: >-
              ../../components/schemas/number-authorisation/Getnumberauthorisationblacklistresponse.yaml
    "403":
      description: Unauthorised
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/403response.yaml
    "429":
      $ref: ../../components/responses/TooManyRequests.yaml
post:
  security:
    - basic_auth: []
    - hmac_auth: []
  tags:
    - Number Authorisation
  summary: Add one or more numbers to your blacklist
  description: >-
    This endpoint allows you to add one or more numbers to your blacklist. You can add up to 10
    numbers in one request.

    NOTE: numbers need to be in international format and therefore start with a +
  operationId: AddOneOrMoreNumbersToYourBlacklist
  parameters: []
  requestBody:
    description: Request body.
    content:
      application/json:
        schema:
          $ref: >-
            ../../components/schemas/number-authorisation/Addoneormorenumberstoyourblacklistrequest.yaml
        example:
          numbers:
            - "61491570156"
            - "61491570157"
    required: true
  responses:
    "201":
      description: If all the numbers are already on the blacklist, then a 200 is returned.
      headers: {}
      content:
        application/json:
          schema:
            $ref: >-
              ../../components/schemas/number-authorisation/Addoneormorenumberstoyourblacklistresponse.yaml
          example:
            uri: /v1/number_authorisation/mt/blacklist
            numbers:
              - "61491570156"
              - "61491570157"
    "400":
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/400response.yaml
    "403":
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/403response.yaml
    "429":
      $ref: ../../components/responses/TooManyRequests.yaml
  deprecated: false
