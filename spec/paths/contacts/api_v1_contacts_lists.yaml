post:
  security:
    - basic_auth: []
    - hmac_auth: []
  tags:
    - Contacts
  summary: Create a contact list
  description: Creates a new contact list.
  operationId: createContactList
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/contacts/CreateListRequest.yaml
    required: true
  responses:
    "201":
      description: Contact list is created
      content:
        "*/*":
          schema:
            $ref: ../../components/schemas/contacts/ListData.yaml
    "400":
      $ref: ../../components/responses/BadRequest.yaml
    "401":
      $ref: ../../components/responses/Unauthorized.yaml
    "403":
      $ref: ../../components/responses/Forbidden.yaml
    "409":
      $ref: ../../components/responses/Conflict.yaml
    "429":
      $ref: ../../components/responses/TooManyRequests.yaml
    "500":
      $ref: ../../components/responses/InternalServerError.yaml
    "501":
      $ref: ../../components/responses/RequestNotRecognised.yaml
    "502":
      $ref: ../../components/responses/BadGateway.yaml
    "503":
      $ref: ../../components/responses/ServerUnavailable.yaml
    "504":
      $ref: ../../components/responses/GatewayTimeout.yaml
get:
  security:
    - basic_auth: []
    - hmac_auth: []
  tags:
    - Contacts
  summary: Get contact lists page
  description: Retrieves a paginated list of contact lists.
  operationId: getContactListsPage
  parameters:
    - name: request
      in: query
      required: true
      description: >
        Pagination and filter options for the contact lists page (page tokens,
        page size, and related filters).
      schema:
        $ref: ../../components/schemas/contacts/GetListsRequest.yaml
  responses:
    "200":
      description: Returns a contact lists page
      content:
        "*/*":
          schema:
            $ref: ../../components/schemas/contacts/PageTokenDtoListData.yaml
    "400":
      $ref: ../../components/responses/BadRequest.yaml
    "401":
      $ref: ../../components/responses/Unauthorized.yaml
    "403":
      $ref: ../../components/responses/Forbidden.yaml
    "409":
      $ref: ../../components/responses/Conflict.yaml
    "429":
      $ref: ../../components/responses/TooManyRequests.yaml
    "500":
      $ref: ../../components/responses/InternalServerError.yaml
    "501":
      $ref: ../../components/responses/RequestNotRecognised.yaml
    "502":
      $ref: ../../components/responses/BadGateway.yaml
    "503":
      $ref: ../../components/responses/ServerUnavailable.yaml
    "504":
      $ref: ../../components/responses/GatewayTimeout.yaml
