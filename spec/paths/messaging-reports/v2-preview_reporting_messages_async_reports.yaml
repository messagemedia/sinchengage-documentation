get:
  security:
    - basic_auth: []
    - hmac_auth: []
    - bearer_auth: []
  tags:
    - Messaging Reports
  summary: Get async report history
  description: Returns a list of asynchronous reports that have been requested by the current account.
  operationId: GetAsyncReportHistory
  parameters:
    - name: page_size
      in: query
      description: The number of items to return per page.
      required: false
      style: form
      explode: true
      schema:
        type: integer
        example: 10
      example: 20
    - name: page_token
      in: query
      description: >-
        A pagination token returned from a previous call. Pass this to retrieve the next page of
        results.
      required: false
      style: form
      explode: true
      schema:
        type: string
        example: eyJyZXBvcnRJZCI6IjUxZjAwOTdmLTkwYjItNGE1OS1hZDg4LWEwZmQ5M2FiYWE4MiJ9
      example: eyJwYWdlIjoyfQ
    - name: report_name
      in: query
      description: Filter results by report name.
      required: false
      style: form
      explode: true
      schema:
        type: string
        example: My Detail Report
    - name: status
      in: query
      description: Filter results by report status. Multiple statuses can be specified.
      required: false
      style: form
      explode: true
      schema:
        type: array
        items:
          type: string
          enum:
            - REQUESTED
            - RUNNING
            - FAILED
            - CANCELLED
            - DONE
    - name: start_date
      in: query
      description: Filter reports requested on or after this date (ISO 8601).
      required: false
      style: form
      explode: true
      schema:
        type: string
        format: date-time
        example: "2020-05-28T10:27:46.259Z"
    - name: end_date
      in: query
      description: Filter reports requested on or before this date (ISO 8601).
      required: false
      style: form
      explode: true
      schema:
        type: string
        format: date-time
        example: "2020-06-28T10:27:46.259Z"
    - name: sort_direction
      in: query
      description: Sort direction for the results.
      required: false
      style: form
      explode: true
      schema:
        type: string
        enum:
          - ASCENDING
          - DESCENDING
        example: ASCENDING
      example: ASCENDING
  responses:
    "200":
      description: A list of async reports for the current account.
      headers: {}
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/messaging-reports/reporthistoryresponses.yaml
    "400":
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/400response.yaml
    "403":
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/403response.yaml
    "429":
      $ref: ../../components/responses/TooManyRequests.yaml
  deprecated: false
