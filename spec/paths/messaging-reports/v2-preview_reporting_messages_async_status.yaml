get:
  security:
    - basic_auth: []
    - hmac_auth: []
  tags:
    - Messaging Reports
  summary: Get async detail report status
  description: Retrieves the status of a detail report.
  operationId: GetAsyncDetailStatus
  parameters:
    - name: report_id
      in: query
      description: The ID of the detail report to retrieve.
      required: true
      style: form
      explode: true
      schema:
        type: string
        example: abc
  responses:
    '200':
      description: The status of the requested detail report.
      headers: {}
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/messaging-reports/reportstatusresponse.yaml
  deprecated: false
