post:
  security:
    - basic_auth: []
    - hmac_auth: []
  tags:
    - Messaging Reports
  summary: Scheduled summary report
  description: Create scheduled report summary containing total number of sent, received and billing units.
  operationId: summaryscheduledreport
  parameters: []
  requestBody:
    description: Request body.
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/messaging-reports/scheduledsummaryreport.yaml
    required: true
  responses:
    "201":
      description: A scheduled summary report received using the specified parameters.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/messaging-reports/scheduledreportresponse.yaml
    "400":
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/400response.yaml
    "403":
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/403response.yaml
    "429":
      $ref: ../../components/responses/TooManyRequests.yaml
  deprecated: false
