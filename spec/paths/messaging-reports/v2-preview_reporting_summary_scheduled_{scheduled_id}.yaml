put:
  security:
    - basic_auth: []
    - hmac_auth: []
  tags:
    - Messaging Reports
  summary: Update a scheduled summary report
  description: >-
    Updates a selected scheduled report summary, which contains a total number of sent, received and
    billing units.
  operationId: updatesummaryscheduledreport
  parameters:
    - name: scheduled_id
      in: path
      required: true
      schema:
        type: string
      description: The ID of the scheduled report to update.
      example: e6fb8282-c7c3-4367-8590-6c77ddb11c3e
  requestBody:
    description: Request body.
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/messaging-reports/updatescheduledsummaryreport.yaml
    required: true
  responses:
    "200":
      description: The updated scheduled summary report.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/messaging-reports/scheduledsummaryreportresposne.yaml
    "400":
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/400response.yaml
    "403":
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/403response.yaml
    "429":
      $ref: ../../components/responses/TooManyRequests.yaml
  deprecated: false
