post:
  security:
    - basic_auth: []
    - hmac_auth: []
  tags:
    - Messaging Reports
  summary: Post async summary report
  description: >-
    Creates an asynchronous report summary containing total number of sent, received and billing
    units.
  operationId: PostAsyncSummaryReport
  parameters: []
  requestBody:
    description: Request body.
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/messaging-reports/asyncsummaryrequest.yaml
  responses:
    "202":
      description: A list of all messages received in the specified time window
      headers: {}
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/messaging-reports/asyncreportresponse.yaml
    "400":
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/400response.yaml
    "403":
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/403response.yaml
    "429":
      $ref: ../../components/responses/TooManyRequests.yaml
  deprecated: false
