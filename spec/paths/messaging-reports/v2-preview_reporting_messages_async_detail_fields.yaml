post:
  security:
    - basic_auth: []
    - hmac_auth: []
  tags:
    - Messaging Reports
  summary: Get async detail fields
  description: Can be used for async detail report to select the fields to export csv files
  operationId: GetAsyncDetailFields
  parameters: []
  requestBody:
    description: Request body.
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/messaging-reports/metakeyrequest.yaml
        example:
          page: 1
          page_size: 50
          start_date: "2020-05-28T10:27:46.259Z"
          end_date: "2020-06-28T10:27:46.259Z"
  responses:
    "200":
      description: A list of selected fields to export csv files.
      headers: {}
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/messaging-reports/fieldsresponse.yaml
    "400":
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/400response.yaml
    "403":
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/403response.yaml
    "429":
      $ref: ../../components/responses/TooManyRequests.yaml
