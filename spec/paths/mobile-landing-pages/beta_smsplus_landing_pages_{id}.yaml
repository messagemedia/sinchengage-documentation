patch:
  security:
    - basic_auth: []
    - hmac_auth: []
  tags:
    - Mobile Landing Pages (beta)
  summary: Update a Landing Page
  description: >-
    The Landing Page datastore makes it easier to create Campaigns based on the saved data.Update a
    Landing Page.
  operationId: UpdateaLandingPage
  parameters:
    - name: id
      in: path
      description: Unique identifier of the landing page.
      required: true
      style: simple
      schema:
        type: string
        example: 7ca628a8-08b0-4e42-aeb8-960b37049c31
      example: 7ca628a8-08b0-4e42-aeb8-960b37049c31
  requestBody:
    description: Request body.
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/mobile-landing-pages/UpdateLandingPage.yaml
        example:
          parameters:
            pageTitle: The new page title
            pageText: The new body text
            imageUrl: https://example.com/image.jpg
    required: true
    x-send-file-in-body: false
  responses:
    "202":
      description: Landing Page was successfully updated.
      headers: {}
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/mobile-landing-pages/UpdateaLandingPageresponse.yaml
          example:
            id: a94041bb-704b-48fa-ba0b-6f1538fc502f
            name: " My Landing Page"
            template_id: ac895f01-3149-4bf8-a8fe-01d3b8a9ba97
            parameters:
              pageTitle: The new page title
              pageText: The new body text
              callToAction: ${ctaUrl}
            fields:
              title:
                type: TEXT
              bodyText:
                type: TEXT
              ctaUrl:
                type: URL
            created_timestamp: "2019-11-03T11:49:02.807Z"
            modified_timestamp: "2019-11-04T11:49:02.807Z"
    "400":
      description: Bad request.
    "402":
      description: Payment required.
    "429":
      $ref: ../../components/responses/TooManyRequests.yaml
delete:
  security:
    - basic_auth: []
    - hmac_auth: []
  tags:
    - Mobile Landing Pages (beta)
  summary: Delete a Landing Page
  description: >-
    The Landing Page datastore makes it easier to create Campaigns based on the saved data.Delete a
    Landing Page.
  operationId: DeleteaLandingPage
  parameters:
    - name: id
      in: path
      description: Unique identifier of the landing page.
      required: true
      style: simple
      schema:
        type: string
        example: 7ca628a8-08b0-4e42-aeb8-960b37049c31
      example: 7ca628a8-08b0-4e42-aeb8-960b37049c31
  responses:
    "204":
      description: Landing Page deleted.
      headers: {}
    "402":
      description: Payment required.
    "429":
      $ref: ../../components/responses/TooManyRequests.yaml
