post:
  security:
    - basic_auth: []
    - hmac_auth: []
  tags:
    - Mobile Landing Pages (beta)
  summary: Create a Landing Page
  description: >-
    The Landing Page datastore makes it easier to create Campaigns based on the saved data.Create a
    Landing Page.
  operationId: CreateaLandingPage
  parameters: []
  requestBody:
    description: Request body.
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/mobile-landing-pages/CreateLandingPage.yaml
        example:
          name: " My Landing Page"
          template_id: ac895f01-3149-4bf8-a8fe-01d3b8a9ba97
          parameters:
            pageTitle: The page title
            pageText: The body text
            imageUrl: https://example.com/image.jpg
          fields:
            title:
              type: TEXT
            bodyText:
              type: TEXT
            ctaUrl:
              type: URL
    required: true
    x-send-file-in-body: false
  responses:
    "201":
      description: Landing Page was successfully created.
      headers: {}
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/mobile-landing-pages/CreateaLandingPageresponse.yaml
          example:
            id: a94041bb-704b-48fa-ba0b-6f1538fc502f
            name: " My Landing Page"
            template_id: ac895f01-3149-4bf8-a8fe-01d3b8a9ba97
            parameters:
              title: This is a ${title}
              bodyText: This is some ${bodyText}
              callToAction: ${ctaUrl}
            fields:
              title:
                type: TEXT
              bodyText:
                type: TEXT
              ctaUrl:
                type: URL
            created_timestamp: "2019-11-03T11:49:02.807Z"
            modified_timestamp: "2019-11-03T11:49:02.807Z"
    "400":
      description: Bad request.
    "402":
      description: Payment required.
    "429":
      $ref: ../../components/responses/TooManyRequests.yaml
get:
  security:
    - basic_auth: []
    - hmac_auth: []
  tags:
    - Mobile Landing Pages (beta)
  summary: Get Landing Pages
  description: >-
    The Landing Page datastore makes it easier to create Campaigns based on the saved data.Returns a
    paginated list of Landing Pages for your account. ```sort_by``` and ```sort_direction``` must
    both be specified or neither at all (the default sort options are ```DESCENDING```
    ```MODIFIED_TIMESTAMP```).
  operationId: GetLandingPages
  parameters:
    - name: page_size
      in: query
      description: Page size between 5 and 100 (default 20)
      style: form
      explode: true
      schema:
        type: string
        example: "20"
      example: "20"
    - name: page_token
      in: query
      description: Token to fetch the next page
      style: form
      explode: true
      schema:
        type: string
        example: eyJwYWdlIjoyfQ
      example: eyJwYWdlIjoyfQ
    - name: sort_by
      in: query
      description: Can be `CREATED_TIMESTAMP` or `UPDATED_TIMESTAMP`
      style: form
      explode: true
      schema:
        type: string
        example: created
      example: created
    - name: sort_direction
      in: query
      description: Can be `ASCENDING` or `DESCENDING`
      style: form
      explode: true
      schema:
        type: string
        example: asc
      example: asc
  responses:
    "200":
      description: Successful response.
      headers: {}
      content:
        application/json:
          schema:
            type: object
    "402":
      description: Payment required.
    "429":
      $ref: ../../components/responses/TooManyRequests.yaml
