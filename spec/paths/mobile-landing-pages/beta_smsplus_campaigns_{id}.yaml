get:
  security:
    - basic_auth: []
    - hmac_auth: []
  tags:
    - Mobile Landing Pages (beta)
  summary: Get Campaign
  description: A single campaign, identified by a unique identifier.Returns the details of a single campaign.
  operationId: GetCampaign
  parameters:
    - name: id
      in: path
      description: Unique identifier of the campaign.
      required: true
      style: simple
      schema:
        type: string
        example: 7ca628a8-08b0-4e42-aeb8-960b37049c31
      example: 7ca628a8-08b0-4e42-aeb8-960b37049c31
  responses:
    "200":
      description: Successful response.
      headers: {}
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/mobile-landing-pages/GetCampaignresponse.yaml
          example:
            id: a94041bb-704b-48fa-ba0b-6f1538fc502f
            template_id: ac895f01-3149-4bf8-a8fe-01d3b8a9ba97
            parameters:
              title: This is a title
              bodyText: This is some body text
              callToAction: http://www.example.com/
            message:
              content: This is the message.
              destination_number: "+61491570156"
              metadata:
                key: value
    "400":
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/400response.yaml
    "403":
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/403response.yaml
    "429":
      $ref: ../../components/responses/TooManyRequests.yaml
