get:
  security:
    - basic_auth: []
    - hmac_auth: []
  tags:
    - Mobile Landing Pages (beta)
  summary: Get Campaign Summary
  description: >-
    The reporting endpoint provides access to the reporting analytics.


    ### Events Types


    The campaign report consists of a series of events, that were generated by
    recipients when

    interacting with the generated mobile landing page.  The set of events that
    are currently supported

    are as follows:


    | Event Type        | Event Source |
    Description                                    |

    |:------------------|:-------------|:-----------------------------------------------|

    | `PAGE_OPEN`       | n/a          | The page was opened in a
    browser.              |

    | `BUTTON_CLICKED`  | Button label | One of the Call to Action buttons was
    clicked. |

    | `FORM_SUBMITTED`  | n/a          | A form has been submitted with the
    captured data stored in the 'data' field. |Returns the breakdown of events
    and recipients of a particular campaign.


    This will contain the following bits of information:


    - The total number of events recorded for the particular campaign.


    - The number of unique engagements.  This is the number of recipients for
    which there exists at least one recorded event.


    - A breakdown of the number of the total number of events grouped by the
    event type and event source


    The event breakdown will return the following information for each event and
    source type:


    - The total number of recorded events of that type and source


    - The number of unique recipients for which that event and source was
    recorded for at least once


    For example, if a recipient opened the landing page three times, the number
    of recorded events will be 3 but the number of unique recipients will be 1.
  operationId: GetCampaignSummary
  parameters:
    - name: campaign_id
      in: path
      description: The campaign ID
      required: true
      style: simple
      schema:
        type: string
  responses:
    '200':
      description: ''
      headers: {}
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/mobile-landing-pages/CampaignSummary.yaml
          example:
            total_events: 24
            unique_engagements: 9
            event_summary:
              - event: PAGE_OPEN
                total_events: 8
                unique_recipients: 6
              - event: BUTTON_CLICK
                source: OK
                total_events: 12
                unique_recipients: 8
              - event: BUTTON_CLICK
                source: Cancel
                total_events: 4
                unique_recipients: 1
  deprecated: false
