post:
  security:
    - basic_auth: []
    - hmac_auth: []
  tags:
    - Mobile Landing Pages (beta)
  summary: Send Campaign To Recipients
  description: Sends a campaign message to a group of recipients.
  operationId: SendCampaignToRecipients
  parameters:
    - name: id
      in: path
      description: Unique identifier of the campaign.
      required: true
      style: simple
      schema:
        type: string
        example: 7ca628a8-08b0-4e42-aeb8-960b37049c31
      example: 7ca628a8-08b0-4e42-aeb8-960b37049c31
  requestBody:
    description: Request body.
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/mobile-landing-pages/SendCampaignToRecipientsrequest.yaml
    required: true
    x-send-file-in-body: false
  responses:
    "202":
      description: The message recipients have successfully been queued for delivery.
      headers: {}
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/mobile-landing-pages/SendCampaignToRecipientsresponse.yaml
          example:
            recipients:
              - id: 05f81030-95fb-4c17-8736-ac73948e8b82
                number: "61491570156"
                parameters:
                  firstName: John
                  lastName: English
              - id: 01261663-9428-4a1d-9798-e8a1877cc29d
                number: "61491570158"
                parameters:
                  firstName: Mary
                  lastName: Example
    "400":
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/400response.yaml
    "403":
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/403response.yaml
    "429":
      $ref: ../../components/responses/TooManyRequests.yaml
  deprecated: false
