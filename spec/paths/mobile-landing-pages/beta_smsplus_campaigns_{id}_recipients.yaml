post:
  security:
    - basic_auth: []
    - hmac_auth: []
  tags:
    - Mobile Landing Pages (beta)
  summary: Send Campaign To Recipients
  description: Sends a campaign message to a group of recipients.
  operationId: SendCampaignToRecipients
  parameters:
    - name: id
      in: path
      description: ''
      required: true
      style: simple
      schema:
        type: string
  requestBody:
    description: ''
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/mobile-landing-pages/SendCampaignToRecipientsrequest.yaml
    required: true
    x-send-file-in-body: false
  responses:
    '202':
      description: The message recipients have successfully been queued for delivery.
      headers: {}
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/mobile-landing-pages/SendCampaignToRecipientsresponse.yaml
          example:
            recipients:
              - id: 05f81030-95fb-4c17-8736-ac73948e8b82
                number: 61491570156
                parameters:
                  firstName: John
                  lastName: English
              - id: 01261663-9428-4a1d-9798-e8a1877cc29d
                number: 61491570158
                parameters:
                  firstName: Mary
                  lastName: Example
  deprecated: false
