get:
  security:
    - basic_auth: []
    - hmac_auth: []
  tags:
    - Mobile Landing Pages (beta)
  summary: Get Campaign Events
  description: >-
    The reporting endpoint provides access to the reporting analytics.


    ### Events Types


    The campaign report consists of a series of events, that were generated by
    recipients when

    interacting with the generated mobile landing page.  The set of events that
    are currently supported

    are as follows:


    | Event Type        | Event Source |
    Description                                    |

    |:------------------|:-------------|:-----------------------------------------------|

    | `PAGE_OPEN`       | n/a          | The page was opened in a
    browser.              |

    | `BUTTON_CLICKED`  | Button label | One of the Call to Action buttons was
    clicked. |

    | `FORM_SUBMITTED`  | n/a          | A form has been submitted with the
    captured data stored in the 'data' field. |Returns a list of events that
    have occurred for a particular campaign.


    At this stage, the events are returned in reverse chronological order.
  operationId: GetCampaignEvents
  parameters:
    - name: campaign_id
      in: path
      description: The campaign ID
      required: true
      style: simple
      schema:
        type: string
    - name: page
      in: query
      description: The page of results to retrieve.  If unspecified, defaults to 0.
      style: form
      explode: true
      schema:
        type: number
        format: double
    - name: page_size
      in: query
      description: The size of each page.  Must be between 5 and 100.  Defaults to 25.
      style: form
      explode: true
      schema:
        type: number
        format: double
  responses:
    '200':
      description: ''
      headers: {}
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/mobile-landing-pages/ListCampaignEventPage.yaml
    '402':
      description: ''
    '404':
      description: ''
  deprecated: false
