get:
  security:
    - basic_auth: []
    - hmac_auth: []
  tags:
    - Mobile Landing Pages (beta)
  summary: Get Campaign Events
  description: >-
    The reporting endpoint provides access to the reporting analytics.


    ### Events Types


    The campaign report consists of a series of events, that were generated by recipients when

    interacting with the generated mobile landing page.  The set of events that are currently
    supported

    are as follows:


    | Event Type        | Event Source | Description                                    |

    |:------------------|:-------------|:-----------------------------------------------|

    | `PAGE_OPEN`       | n/a          | The page was opened in a browser.              |

    | `BUTTON_CLICKED`  | Button label | One of the Call to Action buttons was clicked. |

    | `FORM_SUBMITTED`  | n/a          | A form has been submitted with the captured data stored in
    the 'data' field. |Returns a list of events that have occurred for a particular campaign.


    At this stage, the events are returned in reverse chronological order.
  operationId: GetCampaignEvents
  parameters:
    - name: campaign_id
      in: path
      description: The campaign ID
      required: true
      style: simple
      schema:
        type: string
        example: f56b5806-f732-4693-b87a-90b66a7d7bfc
      example: f56b5806-f732-4693-b87a-90b66a7d7bfc
    - name: page
      in: query
      description: The page of results to retrieve.  If unspecified, defaults to 0.
      style: form
      explode: true
      schema:
        type: number
        format: double
        example: 1
      example: 1
    - name: page_size
      in: query
      description: The size of each page.  Must be between 5 and 100.  Defaults to 25.
      style: form
      explode: true
      schema:
        type: number
        format: double
        example: 20
      example: 20
  responses:
    "200":
      description: Successful response.
      headers: {}
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/mobile-landing-pages/ListCampaignEventPage.yaml
    "402":
      description: Payment required.
    "404":
      description: Not found.
    "429":
      $ref: ../../components/responses/TooManyRequests.yaml
  deprecated: false
