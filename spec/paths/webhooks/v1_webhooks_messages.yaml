get:
  security:
    - basic_auth: []
    - hmac_auth: []
  tags:
    - Webhooks Management
  summary: Retrieve webhook
  description: >-
    Retrieve all the webhooks created for the connected account.

    A successful request to the retrieve webhook endpoint will return a response body as follows:


    ```

    {
        "page": 0,
        "pageSize": 100,
        "pageData": [
            {
                "url": "https://webhook.com",
                "method": "POST",
                "id": "8805c9d8-bef7-41c7-906a-69ede93aa024",
                "encoding": "JSON",
                "events": [
                    "RECEIVED_SMS"
                ],
                "headers": {},
                "template": "{\"id\":\"$mtId\", \"status\":\"$statusCode\"}",
                "read_timeout": 5000,
                "retries": 3,
                "retry_delay": 30
                
            }
        ]
    }

    ```


    *Note: Response 400 is returned when the `page` query parameter is not valid or the `pageSize`
    query parameter is not valid.*
  operationId: RetrieveWebhook
  parameters:
    - name: page
      in: query
      description: Page number for pagination (1-based).
      style: form
      explode: true
      schema:
        type: integer
        format: int32
        example: 1
      example: 1
    - name: page_size
      in: query
      description: Number of results per page.
      style: form
      explode: true
      schema:
        type: integer
        format: int32
        example: 20
      example: 20
  responses:
    "200":
      description: Successful response.
      headers: {}
      content:
        application/json:
          schema:
            type: object
    "400":
      description: Unexpected error in API call. See HTTP response body for details.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/webhooks/UpdateWebhook400response.yaml
          example:
            message: Something went wrong. Please try again later.
    "429":
      $ref: ../../components/responses/TooManyRequests.yaml
  deprecated: false
post:
  security:
    - basic_auth: []
    - hmac_auth: []
  tags:
    - Webhooks Management
  summary: Create webhook
  description: >
    Create a webhook for one or more of the specified events.


    A webhook would typically have the following structure:


    ```

    { 
      "url": "http://webhook.com",
      "method": "POST",
      "encoding": "JSON",  
      "headers": {"Account": "DeveloperPortal7000"  },  
      "events": ["RECEIVED_SMS"  ],
      "template": {
        "id":"$mtId",
        "status":"$statusCode"}
      "read_timeout": 5000,
      "retries": 3,
      "retry_delay": 30
      }

    ```


    A valid webhook must consist of the following properties:


    - ```url``` The configured URL which will trigger the webhook when a selected event occurs.


    - ```method``` The methods to map CRUD (create, retrieve, update, delete) operations to HTTP
    requests.


    - ```encoding``` Webhooks can be delivered using different content types. You can choose from
    ```JSON```, ```FORM_ENCODED``` or ```XML```. This will automatically add the Content-Type header
    for you so you don't have to add it again in the `headers` property.


    - ```headers``` HTTP header fields which provide required information about the request or
    response, or about the object sent in the message body. This should NOT include the
    `Content-Type` header.


    - ```events``` Event or events that will trigger the webhook. Atleast one event should be
    present.


    - ```template``` The structure of the payload that will be returned. You can format this in JSON
    or XML.


    - ```read_timeout``` (Optional) The read timeout for the call to the Webhook in milliseconds.
    Set to 20000 by default, max 60000.


    - ```retries``` (Optional) The read timeout for the call to the Webhook in milliseconds. Set to
    20000 by default, max 60000.


    - ```retry_delay``` (Optional) The delay period between retries in seconds. Minimum of 5, max
    60.





    #### Types of Events


    You can select all of the events (listed below) or combine them in whatever way you like but
    atleast one event must be used. Otherwise, the webhook won't be created.


    A webhook will be triggered when any one or more of the events occur:


    + **SMS** 
      + `RECEIVED_SMS` Receive an SMS
      + `OPT_OUT_SMS` Opt-out occured
    + **MMS**
      + `RECEIVED_MMS` Receive an MMS
    + **DR (Delivery Reports)**
      + `ENROUTE_DR` Message is enroute
      + `EXPIRED_DR` Message has expired
      + `REJECTED_DR` Message is rejected
      + `FAILED_DR` Message has failed
      + `DELIVERED_DR` Message is delivered
      + `SUBMITTED_DR` Message is submitted

    #### Template Parameters


    You can choose what to include in the data that will be sent as the payload via the Webhook.
    It's upto you to choose what format you would like the payload to be returned. You can choose
    between JSON or XML.


    Keep in my mind, if you've chosen JSON as the format, you must escape the JSON in the template
    value (see example above).


    The table illustrates a list of all the parameters that can be included in the template and
    which event types it can be applied to.


    | Data  | Parameter Name | Example | Event Type |

    |:--|--|--|--:|

    | **Service Type**  | $format, $type *- `$type` will be deprecated in the future; use `$format`
    instead*| `SMS` | `DR` `MO` `MO MMS` |

    | **Message ID**  | $mtId, $messageId| `877c19ef-fa2e-4cec-827a-e1df9b5509f7` | `DR` `MO` `MO
    MMS`|

    | **Delivery Report ID** |$drId, $reportId| `01e1fa0a-6e27-4945-9cdb-18644b4de043` | `DR` |

    | **Reply ID**| $moId, $replyId| `a175e797-2b54-468b-9850-41a3eab32f74` | `MO` `MO MMS` |

    | **Account ID**  | $accountId| `DeveloperPortal7000` | `DR` `MO` `MO MMS` |

    | **Message Timestamp**  | $submittedTimestamp| `2016-12-07T08:43:00.850Z` | `DR` `MO` `MO MMS`
    |

    | **Provider Timestamp**  | $receivedTimestamp| `2016-12-07T08:44:00.850Z` | `DR` `MO` `MO MMS`
    |

    | **Message Status** | $status| `enroute` | `DR` |\n| **Status Code**  | $statusCode| `200` |
    `DR` |

    | **External Metadata** | $metadata.get('key')| `name` | `DR` `MO` `MO MMS` |

    | **Source Address**| $sourceAddress| `+61491570156` | `DR` `MO` `MO MMS` |

    | **Destination Address**| $destinationAddress| `+61491593156` | `MO` `MO MMS` |

    | **Message Content**| $mtContent, $messageContent, $esc.json($!mtContent) *- when used in
    `JSON` encoded `template`*| `Hi Derp` | `DR` `MO` `MO MMS` |

    | **Reply Content**| $moContent, $replyContent, $esc.json($!moContent) *- when used in `JSON`
    encoded `template`*| `Hello Derpina` | `MO` `MO MMS` |

    | **Retry Count**| $retryCount| `1` | `DR` `MO` `MO MMS` |

    | **Billing Unit**| $billingUnits| `1` | `DR` |

    | **Attachments**| $attachments, refer to example below on how to use in `JSON` encoded
    `template`| <code>[<br>  {<br>    "content_type": "image/png",<br>    "content": "...",<br>   
    "original_name": "file.png"<br>  }<br>]</code> | `MO MMS` |


    #### Example Webhook Request with Templates


    ##### MO / MO MMS


    ```

    {
      "url": "http://webhook.com",
      "method": "POST",
      "encoding": "JSON",
      "events": ["RECEIVED_MMS"],
      "template": "{  \"account_id\": \"$accountId\",  \"reply_id\": \"$replyId\",  \"destination_number\": \"$destinationAddress\",  \"source_number\": \"$sourceAddress\",  \"date_received\": \"$receivedTimestamp\",  \"message_id\": \"$messageId\",  #if ($attachments)  \"attachments\": [   #foreach ($entry in $attachments)    {      \"content_type\": \"$entry.contentType\",      \"content\": \"$entry.base64\",      \"original_name\": \"$entry.originalName\"    }#if( $foreach.hasNext ),#end    #end  ],  #else  \"content\": \"$esc.json($moContent)\",  #end  \"metadata\": {    #foreach ($entry in $metadata.entrySet())    \"$entry.key\": \"$entry.value\"#if( $foreach.hasNext ),#end    #end  }}"
    }

    ```


    ##### DR (Delivery Report)


    ```

    {
      "url": "http://webhook.com",
      "method": "POST",
      "encoding": "JSON",
      "events": ["DELIVERED_DR"],
      "template": "{  \"delivery_report_id\": \"$drId\",  \"source_number\": \"$sourceAddress\",  \"date_received\": \"$receivedTimestamp\",  \"status\": \"$status\",  \"delay\": \"0\",  \"submitted_date\": \"$submittedTimestamp\",  \"message_id\": \"$messageId\",  \"original_text\": \"$esc.json($!mtContent)\",  \"vendor_account_id\": {    \"vendor_id\": \"$vendorId\",    \"account_id\": \"$accountId\"  },  \"error_code\": \"$statusCode\",  \"metadata\": {    #foreach($key in $metadata.keySet())    \"$key\": \"$esc.json($metadata.get($key))\"#if( $velocityHasNext ),#end    #end  }}"
    }

    ```

     #### Message Statuses

    Delivery Reports indicate message status. A message can have one of the following statuses:

    * `enroute`: Message has been received by the gateway and is being processed (or waiting to be
    processed).

    * `submitted`: Message has been submitted to a provider/carrier for delivery.

    * `delivered`: Message delivery has been confirmed by the provider, including to the handset
    (where possible).

    * `expired`: The message has expired.

    * `rejected`: The message will not be delivered - permanent failure. Reasons may include usage
    limit exceeded, insufficient credit, number blocked, or content filtered

    * `failed`: The message has failed. Reasons may include no active routes to destination or
    undeliverable by downstream provider.


    #### Message Status Codes

    Status codes provide more granular insight into a message's status. A message can have one of
    the following status codes:

    * `101`: Message being processed by the gateway.

    * `102`: Message is being rerouted to a different provider after failing via the first provider.

    * `151`: Message held for screening.

    * `200`: Message submitted to downstream provider for  delivery.

    * `210`: Message accepted by downstream provider.

    * `211`: Message is enroute for delivery by provider.

    * `212`: Message submitted. Delivery pending.

    * `213`: Message scheduled for delivery by downstream  provider.

    * `220`: Message delivered.

    * `221`: Message delivered to the handset.

    * `320`: Message validity period has expired (prior to  submission).

    * `401`: Message validity period has expired (before delivery ).

    * `301`: Usage threshold reached. Message discarded.

    * `302`: Destination address blocked. Message discarded.

    * `303`: Source address blocked. Message discarded.

    * `304`: Message dropped. Contact support.

    * `305`: Message discarded due to duplicate detection.

    * `402`: Message rejected by downstream provider.

    * `403`: Message skipped by downstream provider.

    * `410`: Invalid source address.

    * `411`: Invalid destination address.

    * `412`: Destination address blocked.

    * `413`: SMS service unavailable on destination.

    * `414`: Destination unreachable.

    * `330`: Gateway failure.

    * `331`: Message discarded.

    * `332`: No available route to destination.

    * `333`: Source address unsupported for this destination.

    * `400`: Message failed; undeliverable.

    * `405`: Message cancelled or deleted by provider.


    *Note: A 400 response will be returned if the `url` is invalid, the `events`, `encoding` or
    `method` is null or the `headers` has a Content-Type  attribute.*
  operationId: CreateWebhook
  parameters: []
  requestBody:
    description: Request body.
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/webhooks/CreateWebhookrequest.yaml
        example:
          url: http://webhook.com
          method: POST
          encoding: JSON
          headers:
            Account: DeveloperPortal7000
          events:
            - ENROUTE_DR
            - DELIVERED_DR
          template: "{\"id\":\"$mtId\",\"status\":\"$statusCode\"}"
    required: true
  responses:
    "201":
      description: Webhook successfully created
      headers: {}
      content:
        application/json:
          schema:
            type: object
            description: Webhook successfully created
    "400":
      description: Unexpected error in API call. See HTTP response body for details.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/webhooks/UpdateWebhook400response.yaml
          example:
            message: Something went wrong. Please try again later.
    "409":
      description: Unexpected error in API call. See HTTP response body for details.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/webhooks/UpdateWebhook400response.yaml
          example:
            message: A webhook with the given url and method already exists.
    "429":
      $ref: ../../components/responses/TooManyRequests.yaml
  deprecated: false
