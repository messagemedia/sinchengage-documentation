get:
  security:
    - basic_auth: []
    - hmac_auth: []
  tags:
    - Source Address
  summary: Get status of a sender address request
  description: >
    Retrieve the current status of a sender address request using the request ID
    returned in the sender address request end point.

    A successful request to the get message status endpoint will return a
    response body as follows:

    ```json

    {
        "id": "365dd65f-7101-46cd-8e79-e49c5620eb15",
        "sender_address": "sample",
        "sender_address_type": "ALPHANUMERIC",
        "usage_type": "ALPHANUMERIC",
        "destination_countries": [
          "AU"
        ],
        "reason": "This is my approval reason",
        "label": "label"
        "status": "APPROVED",
        "account_id": "sample",
        "created_date": "2023-09-07T05:48:26.741Z",
        "last_modified_date": "2023-09-07T05:49:20.888Z"
    }

    ```
  operationId: GetStatusOfSenderAddressRequest
  parameters:
    - name: id
      in: path
      description: 36 character UUID.
      required: true
      style: simple
      schema:
        type: string
  responses:
    '200':
      description: Get the status of Sender Address Request
      headers: {}
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/source-address/AlphaTagRequestItem.yaml
    '400':
      description: Bad request
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/400response.yaml
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/403response.yaml
    '404':
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/404response.yaml
