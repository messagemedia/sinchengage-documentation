get:
  security:
    - basic_auth: []
    - hmac_auth: []
  tags:
    - Source Address
  summary: Get sender address by id
  operationId: GetSenderAddressById
  description: |
    Retrieve a sender address currently registered to your account by Id
  parameters:
    - name: id
      in: path
      description: The UUID of the sender address
      required: true
      schema:
        type: string
        format: uuid
        example: 01ccaccb-e654-4503-bb7e-123456789abc
  responses:
    '200':
      description: A sender address for your account only
      headers: {}
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/source-address/GetSenderAddress.yaml
    '400':
      description: Bad request
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/400response.yaml
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/403response.yaml
delete:
  security:
    - basic_auth: []
    - hmac_auth: []
  tags:
    - Source Address
  summary: Delete Sender Address
  description: >
    Remove any registered sender addresses that are no longer required from your
    account.
  operationId: deleteSenderAddressUsingDELETE
  parameters:
    - name: id
      in: path
      description: The UUID of the sender address
      required: true
      schema:
        type: string
        format: uuid
        example: 01ccaccb-e654-4503-bb7e-123456789abc
    - name: reason
      in: query
      description: A string detailing why the sender address is being removed
      required: true
      schema:
        type: string
        example: I%20want%20do%20delete%20this%20number.
  responses:
    '202':
      description: Accepted
    '400':
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/400response.yaml
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/403response.yaml
    '404':
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/404response.yaml
patch:
  security:
    - basic_auth: []
    - hmac_auth: []
  tags:
    - Source Address
  summary: Update My Own Number Label
  description: |
    Update label for my own number only.
  operationId: updateSenderAddressUsingPATCH
  parameters:
    - name: id
      in: path
      description: The UUID of the sender address
      required: true
      schema:
        type: string
        format: uuid
        example: 01ccaccb-e654-4503-bb7e-123456789abc
  requestBody:
    description: Input the label need to update
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/source-address/PatchLabelMyOwnNumber.yaml
        example:
          label: ExampleLabel
    required: true
  responses:
    '200':
      description: OK
      headers: {}
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/source-address/GetSenderAddress.yaml
    '400':
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/400response.yaml
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/403response.yaml
    '404':
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/404response.yaml
