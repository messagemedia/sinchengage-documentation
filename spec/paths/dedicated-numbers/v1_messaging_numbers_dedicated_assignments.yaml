get:
  security:
    - basic_auth: []
    - hmac_auth: []
  tags:
    - Dedicated Numbers
  summary: Get assigned numbers
  description: ''
  operationId: GetAssignedNumbers
  parameters:
    - name: page_size
      in: query
      description: Number of results returned per page, default 50
      style: form
      explode: true
      schema:
        type: integer
        format: int32
        example: 3
    - name: token
      in: query
      description: >-
        In paginated data the original request will return with a "next_token"
        attribute. This token must be entered into subsequent call in the
        "token" query parameter to obtain the next set of records.
      style: form
      explode: true
      schema:
        type: string
        example: example
    - name: number_id
      in: query
      description: Unique identifier of a specific number
      style: form
      explode: true
      schema:
        type: string
        example: examples
    - name: matching
      in: query
      description: Filters results by a pattern of digits contained within the number
      style: form
      explode: true
      schema:
        type: string
        example: 223344
    - name: country
      in: query
      description: >-
        Filter results by ISO_3166 country code, 2 character code to filter
        available numbers by country
      style: form
      explode: true
      schema:
        type: string
        example: AU
    - name: type
      in: query
      description: >-
        Filter results by Number type. When both `type` and `types` are
        provided, `types` will take precedence, and `type` will be ignored.
      style: form
      explode: true
      schema:
        $ref: ../../components/schemas/dedicated-numbers/Type.yaml
    - name: types
      in: query
      description: Filter results by Number Types
      style: form
      explode: true
      schema:
        $ref: ../../components/schemas/dedicated-numbers/Types.yaml
    - name: classification
      in: query
      description: Filter results by Number Classification
      style: form
      explode: true
      schema:
        $ref: ../../components/schemas/dedicated-numbers/Classification.yaml
    - name: service_types
      in: query
      description: Filter results by capabilities
      style: form
      explode: true
      schema:
        $ref: ../../components/schemas/dedicated-numbers/service_types.yaml
    - name: label
      in: query
      description: Filter results by a matching label
      style: form
      explode: true
      schema:
        type: string
        example: examples
    - name: sort_by
      in: query
      description: Sort results by property
      style: form
      explode: true
      schema:
        $ref: ../../components/schemas/dedicated-numbers/sort_by.yaml
    - name: sort_direction
      in: query
      description: Sort direction
      style: form
      explode: true
      schema:
        $ref: ../../components/schemas/dedicated-numbers/sort_direction.yaml
    - name: Accept
      in: header
      description: ''
      required: true
      style: simple
      schema:
        type: string
        example: application/json;charset=UTF-8
  responses:
    '200':
      description: OK
      headers: {}
      content:
        application/json;charset=UTF-8:
          schema:
            $ref: ../../components/schemas/dedicated-numbers/AssignedNumberListResponse.yaml
          example:
            pagination:
              next_token: 0428d673-0f75-4063-9493-e89d75f13438
              page_size: 5
            data:
              - assignment:
                  metadata:
                    type: object
                    additionalProperties:
                      $ref: '#/components/schemas/Metadata'
                  label: LabelTest0
                  id: be3cb602-7c00-4c87-ae4b-b8defc04f179
                  number_id: b9ee3fe8-2c20-47b1-96e9-c5d12d7ed985
                number:
                  id: 03cf54ad-a4a3-4cd1-afd5-e0ca2cf158a3
                  phone_number: 61436489205
                  country: AU
                  type: MOBILE
                  classification: BRONZE
                  available_after: '2019-08-06T23:56:15.633Z'
                  capabilities:
                    - SMS
    '403':
      description: Unauthorised
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/403response.yaml
          example:
            message: Invalid authentication credentials
  deprecated: false
