get:
  security:
    - basic_auth: []
    - hmac_auth: []
  tags:
    - Dedicated Numbers
  summary: Get number by ID
  description: Get details about a specific dedicated number.
  operationId: GetNumberById
  parameters:
    - name: id
      in: path
      description: unique identifier
      required: true
      style: simple
      explode: true
      schema:
        type: string
        example: e2014bc7-5fed-4e27-bd8c-XXXXXXXXXXX
    - name: Accept
      in: header
      description: ''
      required: true
      style: simple
      schema:
        type: string
        example: application/json;charset=UTF-8
  responses:
    '200':
      description: OK
      headers: {}
      content:
        application/json;charset=UTF-8:
          schema:
            $ref: ../../components/schemas/Number.yaml
          example:
            id: be3cb602-7c00-4c87-ae4b-b8defc04f179
            phone_number: 614111111111
            country: AU
            type: MOBILE
            classification: SILVER
            available_after: '2019-06-21T04:04:31.707Z'
            capabilities:
              - SMS
              - MMS
    '403':
      description: Unexpected error in API call. See HTTP response body for details.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/403response.yaml
          example:
            message: Invalid authentication credentials
    '404':
      description: Unexpected error in API call. See HTTP response body for details.
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/404response.yaml
          example:
            message: Not found
  deprecated: false
