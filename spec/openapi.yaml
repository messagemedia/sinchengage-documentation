info:
  version: 2.1.0
  title: Sinch Engage
  termsOfService: https://www.sinch.com/legal/terms-and-conditions/
  contact:
    name: Sinch Engage Support
    email: support@app.sinch.com
    url: https://support.app.sinch.com/hc/en-us/categories/10516535548943-Sinch-Engage-Developer-Guides
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  x-logo:
    url: ./logo.png
  description: >
    # Introduction

    The Sinch APIs provide powerful business messaging capabilities across
    sending, receiving, and processing SMS, MMS, and rich messaging. 


    All requests to the Sinch REST API must be authenticated, this can either be
    done using Basic Authentication or by signing with a HMAC signature.




    # Base URI
      
    The API uses the following base URI


    For EU instance please use https://eu.app.api.sinch.com


    For APAC instance, use https://au.app.api.sinch.com


    # Credentials
      
    To access the API, an API key and secret are required.
      
    [Sign up for a developer account here to get
    access](https://support.app.sinch.com/hc/en-us/categories/10516535548943-Sinch-Engage-Developer-Guides)


    # Features

    ###  De-Duplication 

    De-Duplication helps you avoid having to undertake data cleansing before
    commencing send outs.  

    It automatically detects and withholds messages deemed to be duplicates
    through the use of a 24-hour window – if a message is sent to the same
    number with the same content within a 24hr period, the subsequent message(s)
    will be withheld and rejected. To enable this, you don't need to make any
    changes to your application, just an account configuration change by Sinch's
    support team.


    ###  Social Sending 

    Social Sending permits messages to be sent only during sociable hours - i.e.
    8am to 6pm (based on your accounts local time zone - not local time). 

    Messages sent outside of these hours are scheduled to be released during the
    next social time period. This feature helps businesses avoid send-outs
    during a time that would be deemed unsuitable by the customer. To enable
    this, you don't need to make any changes to your application, just an
    account configuration change by Sinch's support team.


    ###  Familiar Sender

    Familiar Sender ensures all communication sent to a customer are from the
    same phone number. 

    This allows businesses to build trust and familiarity with their customers
    and not confuse them by changing outgoing numbers. To enable this, you don't
    need to make any changes to your application, just an account configuration
    change by Sinch's support team.


    ### Character Converter

    Characters in a message may not always fall within the GSM-7 supported
    characterset, and when this occurs all 

    outbound messages will be encoded using UCS-2 leading to the customer being
    double-charged for the SMS. Character Converter 

    can help you avoid being double-charged for your SMS by converting all
    characters into the GSM-7 format ensuring you always 

    get the maximum characters into an SMS. Bear in my mind, this will downgrade
    all your unicode characters so for instance, 

    your emojis will be translated into a string of unknown characters (eg: �). 
    To enable this, you don't need to make any 

    changes to your application, just an account configuration change by Sinch's
    support team.
tags:
  - name: Basic Authentication
    kind: nav
    description: >-

      Every request requires an `Authorization` header in the following format:

      ```plain

      Authorization: Basic Base64(api_key:api_secret)

      ```

      Where the header consists of the Basic keyword followed by your Basic
      Authentication `api_key` and `api_secret` that you have been supplied by
      support, separated with a colon (:) which is then Base64 encoded.

      ### Example request with Basic Authentication

      ```plain

      POST /v1/messages HTTP/1.1

      Host: eu.app.api.sinch.com

      Accept: application/json

      Content-Type: application/json

      Authorization: Basic
      dGhpc2lzYWtleTp0aGlzaXNhc2VjcmV0Zm9ybW1iYXNpY2F1dGhyZXN0YXBp

      {
        "messages": [
          {
            "content": "Hello World",
            "destination_number": "+61491570156",
            "format": "SMS"
          }
        ]
      } 

      ```

      _Note: spaces are used as indentation in the body of the above request._
  - name: HMAC Authentication
    kind: nav
    description: >-

      Every request requires an `Authorization` header in the following formats:

      For a request with a request body:

      ```plain

      Authorization: hmac username="<API KEY>", algorithm="hmac-sha256",
      headers  ="Date Content-MD5 request-line", signature="<SIGNATURE>"

      ```


      For a request _without_ a request body:


      ```plain

      Authorization: hmac username="<API KEY>", algorithm="hmac-sha256",
      headers="Date request-line", signature="<SIGNATURE>"

      ```

      ### To create this header

      #### Step 1

      Add a `Date` header to the request using the current date time in [RFC7231
      Section 7.1.1.2](http://tools.ietf.org/html/rfc7231#section-7.1.1.2)
      format

      #### Step 2

      If the request has a body, add a header called `Content-MD5` where the
      value of this header is an MD5 hash of the request body, otherwise this
      header is not required

      #### Step 3

      Create a signing string by concatenating the `Date` header, the

      `Content-MD5` header (if set) and the request line with line breaks:

      ```plain

      Date: Sat, 30 Jul 2016 05:13:23 GMT\nContent-MD5:
      10fd4feab20d38432480c07301e49616\nPOST /v1/messages HTTP/1.1

      ```

      or

      ```plain

      Date: Sat, 30 Jul 2016 05:13:23 GMT\nGET
      /v1/messages/404b941b-2a29-469f-b114-9ea3e16bbe18 HTTP/1.1

      ```

      #### Step 4

      Create a SHA256 HMAC hash using the signing string and the secret key
      (both converted to bytes using UTF-8) ```HMAC-SHA256(signing string,
      secret)```

      #### Step 5

      Base64 encode the HMAC hash and include it as the signature in the
      ```Authorization``` header

      ### Example request with body

      ```plain

      POST /v1/messages HTTP/1.1

      Host: eu.app.api.sinch.com

      Accept: application/json

      Content-Type: application/json

      Date: Sat, 30 Jul 2016 05:18:52 GMT

      Authorization: hmac username="uCXUdoogNfCsehEClbO2",
      algorithm="hmac-sha256", headers="Date Content-MD5 request-line",
      signature="Ia4G5lkhH/3NDYpix+8ZHUnp6bA="

      Content-MD5: 5407644fa83bec240dede971307e0cad

      Content-Length: 133

      {
        "messages": [
          {
            "content": "Hello World",
            "destination_number": "+61491570156",
          "format": "SMS"
          }
        ]
      }

      ```

      _Note: spaces are used as indentation in the body of the above request._

      ### Example request without body

      ```plain

      GET /v1/messages/404b941b-2a29-469f-b114-9ea3e16bbe18 HTTP/1.1

      Host: eu.app.api.sinch.com

      Accept: application/json

      Date: Sat, 30 Jul 2016 05:18:52 GMT

      Authorization: hmac username="uCXUdoogNfCsehEClbO2",
      algorithm="hmac-sha256", headers="Date request-line",
      signature="NTUwMjUwNTVmZGYzZTIxODMyYjc1ZmM3M2EwZWQ1NzA3NzA4ZTZjNw==" ```
  - name: Development Tools
    kind: nav
    description: >
      ## SDKs

      Software Development Kits are available across six languages to assist
      with integration with the major endpoints. 


      In the event an SDK is not available or does not work with your
      environment, any standard HTTP client library can be used. These are some
      client libraries we recommend, 

      that include HMAC authentication capability: 


      ### C#

      [RestSharp](http://restsharp.org/) with custom authenticator


      ### Java

      [Acquia HTTP Request
      Interceptor](https://github.com/acquia/http-hmac-java) for the Apache HTTP
      Client


      ### Javascript

      [Acquia HTTP HMAC Signer for
      JavaScript](https://github.com/acquia/http-hmac-javascript)


      ### PHP

      [HTTP HMAC Signer for PHP](https://github.com/acquia/http-hmac-php) Which
      can be used with [Guzzle](http://docs.guzzlephp.org/en/stable/).


      ### Python

      [HMAC](https://github.com/guardian/httpie-hmac-auth) auth plugin for
      [HTTPie](https://github.com/jakubroztocil/httpie).


      ### Ruby

      [APIAuth](https://github.com/mgomes/api_auth) Ruby Gem 
  - name: Sub-accounts
    kind: nav
    description: >
      ## Performing actions on behalf of sub-accounts

      Using API keys at the parent account level, you can perform actions on
      behalf of a sub-account. 


      This feature is supported by the Messages, Replies, Delivery Reports and
      Webhooks APIs. 


      To do this
        include a header key ```Account``` with the sub-account ID as the value. For example:
        ```Account: mySubAccount```

        **Example request with Sending from sub-accounts**

        ```plain
        POST /v1/messages HTTP/1.1
        Host: eu.app.api.sinch.com
        Accept: application/json
        Content-Type: application/json
        Authorization: Basic dGhpc2lzYWtleTp0aGlzaXNhc2VjcmV0Zm9ybW1iYXNpY2F1dGhyZXN0YXBp
        Account: SubAccount
        {
          "messages": [
            {
              "content": "Hello World",
              "destination_number": "+61491570156",
              “delivery_report”: true
            }
          ]
        } 
        ```
  - name: Messages
    description: >-
      The Sinch Messages API provides a number of endpoints for building
      powerful two-way messaging applications. The Messages API provides access
      to three main resources:

      * Messages - Messages delivered from an application to a handset.

      * Delivery Reports - Real time reports on the delivery status of a
      message. As a message is processed, it's status may change several times
      before it is finally delivered to a handset.

      * Replies - Messages sent from a handset to an application. These messages
      are typically a reply to a previously sent message.

      ![Message Flow](./message-flow.png)
  - name: Source Address
    description: >
      The source address API provides several endpoints for you to request an
      SMS sender ID and track its approval status.


      **What is Trusted Sender ID?**


      Simply put, a sender ID is whatever you send a text message from. This is
      typically either a phone number, or a string of alphanumeric characters
      (commonly referred to as an “Alpha Tag”).


      With regulations surrounding SMS becoming much stricter all over the world
      in an effect to combat scam SMS messages, Sinch is working on “Trusted
      Sender ID” a concept that allows customers to request a Sender ID and have
      it verified.


      Currently, Trusted Sender ID supports two types of Sender ID: Alpha Tags
      and Personal (“Own”) Numbers. It will likely be extended to support
      additional number types, such as TFN and 10DLC where additional
      registration, (external) verification, and overall account whitelist of
      numbers will be required.


      ### Alpha Tag
        Sending messages from your brand name is particularly ideal for SMS marketing and two-factor authentication, as it increases recognition and trust. There are, however, a few considerations to be aware of. 
        
        Alpha tags are made up of 3-11 letters and/or numbers. Alpha tags must be registered and approved before sending and must have clear relevancy to your business and/or use case.
        
        Alpha Tags appear as the “From” number when you receive messages.
        
        A good alpha tag meets at least one of the following valid use cases: 
        * Business names
        * Trademark names    
        * Product or service name
        * an acronym, initialism, or contraction of your entity
        
        In addition to the requirements around clearly relating to the business, we typically advise the following for alpha tags to ensure maximum compatibility with the various carriers:
        * 6-11 characters long
        * Only contains characters from the following sets:
        * A-Z
        * a-z
        * 0-9
        * _ (underscore)
        * \- (hyphen)
        
        Alpha Tags can currently be registered through the Source Address API for the following countries: ```AD```, ```AI```, ```AL```, ```AS```, ```AT```, ```AU```, ```AW```, ```BA```, ```BB```, ```BH```, ```BW```, ```CD```, ```CH```, ```CK```, ```CY```, ```DE```, ```DJ```, ```DK```, ```DM```, ```EE```, ```ES```, ```FI```, ```FJ```, ```FM```, ```FO```, ```FR```, ```GB```, ```GD```, ```GG```, ```GI```, ```GL```, ```GM```, ```GQ```, ```GR```, ```GY```, ```IL```, ```IM```, ```IS```, ```JE```, ```JM```, ```JP```, ```KI```, ```KY```, ```LA```, ```LI```, ```LS```, ```LT```, ```LU```, ```LV```, ```MC```, ```ME```, ```MH```, ```MO```, ```MR```, ```MS```, ```MT```, ```MV```, ```NC```, ```NF```, ```NL```, ```NO```, ```NR```, ```NU```, ```PF```, ```PM```, ```PT```, ```SB```, ```SC```, ```SE```, ```SH```, ```SL```, ```SM```, ```ST```, ```TC```, ```TD```, ```TO```, ```VC```, ```VG``` and ```WS```
        
        To register an Alpha Tag as a sender ID you must:
        1. Make a request to the **Request a Sender Address** endpoint
        2. Wait for the alpha tag to be approved. The status of the alpha tag can be monitored using the **Get status of a sender address request** endpoint
        
        Once the alpha tag has been approved, you can begin using it as a Sender ID for SMS messages.

        ### Personal Number
        A personal number, or “My Own Number”, is a number that you own rather than one provided to you by Sinch. Typically, this is your personal mobile phone number. You may wish to register this number for use with our service so that you can easily send messages from a number already associated with your organisation.
        
        Before you can send messages using your own number, you need to verify that you have a right to use that number. Ensuring you have a right to use a phone number is an important regulatory requirement, aiming to prevent scam, spam, and misuse of messaging services.

        Personal numbers can currently be registered through the Source Address API for the following countries: ```AT```, ```AU```, ```CH```, ```CY```, ```DE```, ```DK```, ```EE```, ```ES```, ```FI```, ```GB```, ```HR```, ```IE```, ```IT```, ```LT```, ```LU```, ```LV```, ```MT```, ```NL```, ```NO```, ```PT```, ```SE```, and ```SI```

        To register a personal number as a Sender ID you must:
        1. Make a request to the **Request a Sender Address** endpoint
        2. A unique verification code will be sent to the requested number
        3. Make a request to the **Submitting a Verification Code** endpoint, using the verification code that was sent in the previous step. A 200 OK response will indicate the number has been verified and is ready for use.

        ⚠️ Own numbers need to be re-verified every 12 months. You will be notified by email that verification of your number is about to expire.

        ### Requesting a Source Address on behalf of a sub-account
        By default, all requests made through the API are made on behalf of the account that the API keys used to authorize the request were made on. API keys created on a parent account can request a source address on behalf of a sub-account. To do this, include a header key ```Account``` with the sub-account ID as the value. For example: 
        ```Account: mySubAccount```

        **Example request with Request a Sender Address from a sub-account**
        ```plain
        POST /v1/messaging/numbers/sender_address/requests HTTP/1.1
        Host: eu.app.api.sinch.com
        Accept: application/json
        Content-Type: application/json
        Authorization: Basic dGhpc2lzYWtleTp0aGlzaXNhc2VjcmV0Zm9ybW1iYXNpY2F1dGhyZXN0YXBp
        Account: mySubAccount
        {
          "sender_address": "+61341234131",
          "sender_address_type": "INTERNATIONAL",
          "usage_type": "OWN_NUMBER",
          "destination_countries": [
              "AU"
          ],
          "reason": "I confirm that my business has a valid use case",
          "label": "my number sample"
        } 
        ```
        *Note: The use of the Account header key applies to all Source Address endpoints.*
  - name: Delivery Reports
    description: >
      If a callback URL is specified in the submit message request, then changes
      to the message status, 

      replies received in response to the message or delivery reports received
      for the message will be pushed via a HTTP POST request. An alternative to
      delivery reports via callbacks is custom webhooks using the webhooks
      management API. 


      All notifications are JSON encoded and the request expects to receive a
      response in the HTTP 200 range. If a valid response isn't received the
      request will be retried in an exponentially backing off fashion.


      Delivery Reports may carry an additional charge. For pricing, please
      contact your Account Manager or Support Team (<support@app.sinch.com>).


      To include billing units in your delivery receipts via Webhooks, ensure
      that the switch "Enable billing units in Delivery Reports and Callbacks”
      is enabled in the API settings of your account.


      For delivery reports or changes in the status of a message, the POST
      request to the specified URL will be as follows:
        
        _Note, multiple delivery report notifications will be recieved for a single message._

      ```json

      {
        "callback_url":"http://mockbin.org/bin/ac52ebd4-eca1-4c86-bf38-4dce79633906",
        "delivery_report_id":"693e87f2-a553-4281-9ffe-ddf04cbc4bf3",
        "source_number":"+61491570156",
        "date_received":"2016-11-03T11:49:02.807Z",
        "status":"delivered",
        "delay":0,
        "billing_units":1,
        "submitted_date":"2016-11-03T11:49:01.551Z",
        "original_text":"Hello world!",
        "message_id":"389dc1a8-62a4-4110-ba61-af94806c006f",
        "vendor_account_id":{
          "vendor_id":"SinchEU",
          "account_id":"MyAccount"
        },
        "error_code":"220",
        "metadata":{
          "key":"value"
        }
      }

      ```



      The properties included in the notification are as follows:


      * **Callback URL**: The URL specified as the callback URL in the original
      submit message request.


      * **Delivery Report ID**: A unique ID for the delivery report that this
      notification represents.


      * **Source Number**: The destination address of the original message.


      * **Date Received**: The date and time at which this notification was
      generated in UTC.


      * **Status**: The status of the message as indicated by this delivery
      report. The status field can be one of the following values:

        * `enroute`: Message has been received by the gateway and is being processed (or waiting to be processed).

        * `submitted`: Message has been submitted to a provider/carrier for delivery.

        * `delivered`: Message delivery has been confirmed by the provider, including to the handset (where possible).

        * `expired`: The message has expired.

        * `rejected`: The message will not be delivered - permanent failure. Reasons may include usage limit exceeded, insufficient credit, number blocked, or content filtered

        * `failed`: The message has failed. Reasons may include no active routes to destination or undeliverable by downstream provider.

      * **Delay**: _Deprecated, no longer in use_


      * **Billing Units**: The number of billing units charged for the message.


      * **Submitted Date**: Date time status of the message changed in UTC. For
      a delivered DR this may indicate the time at which the message was
      received on the handset.


      * **Original Text**: Text of the original message.


      * **Message ID**: ID of the original message.


      * **Vendor Account ID**: The account used to submit the original message.
      The vendor will always be `SinchEU`


      * **Error Code**: A status code which provides additional information
      about the message status:

        * `101`: Message being processed by the gateway.
        
        * `102`: Message is being rerouted to a different provider after failing via the first provider.
        
        * `151`: Message held for screening.
        
        * `200`: Message submitted to downstream provider for delivery.
        
        * `210`: Message accepted by downstream provider.
        
        * `211`: Message is enroute for delivery by provider.
        
        * `212`: Message submitted. Delivery pending.
        
        * `213`: Message scheduled for delivery by downstream provider.
        
        * `220`: Message delivered.
        
        * `221`: Message delivered to the handset.
        
        * `320`: Message validity period has expired (prior to submission).
        
        * `401`: Message validity period has expired (before delivery).
        
        * `301`: Usage threshold reached. Message discarded.
        
        * `302`: Destination address blocked. Message discarded.
        
        * `303`: Source address blocked. Message discarded.
        
        * `304`: Message dropped. Contact support.
        
        * `305`: Message discarded due to duplicate detection.
        
        * `402`: Message rejected by downstream provider.
        
        * `403`: Message skipped by downstream provider.
        
        * `410`: Invalid source address.
        
        * `411`: Invalid destination address.
        
        * `412`: Destination address blocked.
        
        * `413`: SMS service unavailable on destination.
        
        * `414`: Destination unreachable.
        
        * `330`: Gateway failure.
        
        * `331`: Message discarded.
        
        * `332`: No available route to destination.
        
        * `333`: Source address unsupported for this destination.
        
        * `400`: Message failed; undeliverable.
        
        * `405`: Message cancelled or deleted by provider.
  - name: Replies
    description: ''
  - name: Number Authorisation
    description: >-
      The number authorisation API allows you to manage your blacklists. Sinch
      automatically adds numbers to your blacklist if people send one of the
      opt-out keywords in response to one of your messages.

      This is a legal requirement. If you decide to handle the legal compliance
      yourself, calls to this endpoint will not affect your messages.
  - name: Dedicated Numbers
    description: "The Numbers API allows your to purchase, provision and configure the dedicated numbers assigned to your Sinch account. \n\nTo learn more about the benefits of dedicated numbers, and their use cases,\_visit our [feature page](https://sinch.com/au/feature/dedicated-virtual-numbers/).\n\nThis is a paid feature and must be enabled on your account. Please contact [support@app.sinch.com](mailto:support@app.sinch.com) or your account manager.\n\n## Concepts\n\nThis API allows you to purchase and assign to your account a number from a pool of dedicated numbers. Dedicated numbers are priced differently according to their classification.\n\nThe following is the system by which we classify dedicated numbers. \n\n| Pattern Type | Gold|  Silver |\n|---|---|---|\n| Same Number  |  Six of same (e.g. 999999) | Five of same (e.g. 999991 or 199999)  | \n| Sequence  |  Six in sequence (e.g. 234567, or 765432) | Five in sequence (e.g. 245678, 456782, or 287654)  |\n|  Triplets |  Two identical (e.g. 123123) or two double (e.g. 444666) | Identical pairs within triplets (e.g. 004008, or 400800), one identical and one in sequence (e.g. 444789, or 345777), or mirror image (e.g. 468864)| \n|Pair|Three identical (e.g. 454545)|Three non-identical (e.g. 447700) or three in sequence (e.g. 232425, or 090807)|\n\nAny numbers that do not meet the criteria for Gold or Silver are classified as Bronze.\n\nFor pricing on dedicated numbers please refer to the Numbers page in our Hub web portal, or speak with your Sinch Account Manager.\n"
  - name: Messaging Reports
    description: >
      The Sinch Reports API provides a number of endpoints for running reports
      of messages sent and received through

      a Sinch Account. The API allows two kinds of reports, _Detailed Reports_
      and _Summary Reports_.


      Detailed reports list all messages and the details of each message sent or
      received in a specified time period. Summary reports allow inbound and
      outbound message data to be aggregated on a number of dimensions.
  - name: Short Trackable Links Reports
    description: >
      Short Trackable Links is a feature available to [Messaging
      API](https://support.app.sinch.com/hc/en-us/categories/10516535548943-Sinch-Engage-Developer-Guides)
      users whereby it automatically and seamlessly shortens any URL to just 22
      characters. Every shortened URL is unique to each recipient.


      The reporting API has endpoints specific to 

      this feature, allowing users to obtain details regarding 

      the number of click-throughs on each URL.


      To enable this feature on your account, contact your account manager or
      contact support on [support@app.sinch.com](mailto:support@app.sinch.com).


      To learn more about the benefits of the Short Trackable Links feature,
      [visit our feature
      page](https://support.app.sinch.com/hc/en-us/articles/10525004171919-Short-Trackable-Links-URL-shortener).
  - name: Webhooks Management
    description: >-
      Webhooks Management API allows you to manage your webhooks configuration.
      You can subscribe to one or several events, retrieve the webhooks, update
      them or even delete them if needed.
  - name: Signature Key Management
    description: >
      As a Sinch customer, you want to be able to ensure that callbacks are
      coming from Sinch and not from a 3rd party. Since 

      these are calls to your own system, you should be provided with an extra
      level of security 

      when calling your resources.


      The Sinch Signature Key API provides a number of endpoints 

      for managing key used to sign each unique request to ensure security 

      and the requests can't (easily) be spoofed. This is similar to using 

      HMAC in your outbound messaging (rather than HTTP Basic).


      The Signature Key API provides seven main endpoints:

      - ```Create signature key``` Create a new signature key for signature
      verification in callbacks.

      - ```Get signature key detail``` Retrieve the current detail of a
      signature key using the key_id returned in the ```create signature key```
      endpoint.

      - ```Delete signature key``` Delete a signature key using the key_id
      returned in the ```create signature key``` endpoint.

      - ```Get signature key list``` Retrieve the paginated list of signature
      keys.

      - ```Enable signature key``` Enable a signature key using the key_id
      returned in the ```create signature key``` endpoint.

      - ```Get enabled signature key``` Retrieve the current enabled signature
      key.

      - ```Disable an enabled signature key``` Disable the current enabled
      signature key.
  - name: Mobile Landing Pages (beta)
    description: >
      The mobile landing pages (MLP) API provides the facilities to create
      mobile landing pages and sends them to recipients. This API is currently
      in beta. 


      *Note: This API is only available in the APAC region.*
        
      ## Concepts


      The approach to creating mobile landing pages involves creating a
      _Campaign_ and sending them to one or more _Recipients_.  A campaign
      consists of the baseline configuration of a mobile landing page and
      message that will be generated and sent to each recipient.


      ## Parameters


      Campaign and Recipients can contain parameters.  These parameters are used
      to customise the generated landing page and the message that is to be sent
      to each user.  Campaign and Recipient parameters are merged to form a
      complete set when processing a recipient.


      When resolving parameters sets, Recipient parameters override Campaign
      parameters with the same name.


      Parameter names used within the template have an associated type, which
      will be validated when creating the Campaign or sending it to Recipients. 
      You are free to define additional parameters for your own uses, such as
      when specifying the message.


      The SMS message that is to be sent to each user is defined at the Campaign
      level. 


      The message itself can consist of parameter references surrounded in
      `${...}`, for example:


      ```Hello ${firstName} ${lastName}, this is your message.```


      ## Sending Mobile Landing Pages 


      From end to end, sending a Mobile Landing Pages involves the following
      steps: 


      ### Step 1: Create a campaign


      Choose a template from the template catalogue, and work out what you are
      going to specify for the required parameters for that template. You will
      then use the `Create new campaign` endpoint to create the campaign. The
      following example 

      specifies the desired parameters for the template_id and sets up a message
      template:


      ```

      {
          "template_id": "ac895f01-3149-4bf8-a8fe-01d3b8a9ba97",
          "parameters": {
            "pageTitle": "The page title",
            "pageText": "The body text",
            "imageUrl": "https://example.com/image.jpg",
            "secondaryImageUrl": "https://www.example.com/optional_secondary_image.jpg",
            "buttonLink": "https://example.com/",
            "buttonText": "Call to Action Button Text",
            "secondaryButtonLink": "https://example.com/optional_secondary_button",
            "secondaryButtonText": "Secondary Call to Action Button"
          },
          "message": {
            "content": "Hello ${firstName} ${lastName}, this is the SMS message body",
            "metadata": {
              "key": "value"
            }
          }
      }

      ```


      Inside the message content the `{}` curly braces indicate template
      placeholders. These are the names of the parameters you will need to
      specify for the message when you send to your recipients.


      ### Step 2: Send to recipients


      Using the `Send campaign to recipients` endpoint, you can specify the id
      of your campaign in the path and a array of recipients as the payload.
      Each recipient will include an E.164 formatted 

      (international) phone number, an optional scheduled time, and values of
      any recipient scoped template parameters you may have created. In the
      following example the recipients have been scoped with the template
      parameters above: 


      ```

      {
        "recipients": [
          {
            "number": "+6140000000",
            "parameters": { "firstName":"Joe", "lastName","Bloe" }
          },
          {
            "number": "+6141111111",
            "parameters": { "firstName":"Jane", "lastName","Doe" }
          }
        ]
      }

      ```


      ## Landing Page Store


      The Landing Page Store is used by the Hub portal to store landing page
      templates that have been configured using the visual interface. This means
      that you can 

      optionally use this data store to programatically send landing pages that
      have been designed and configured in the hub.


      If you have made a landing page in the hub, use the `Get landing pages`
      endpoint to find the landing pages you have made, along with the template
      and parameters that have been configured. 

      You will then need to copy those template and parameters into a campaign. 


      ## Template Parameters


      Each template will have different required parameters, shown in the
      Templates section. The following is a description of the requirements of
      each parameter when included in a template.


      | Parameter | Required | Tyep|Description |

      |------------------|-------------|-----------|-----------|

      | imageBackgroundUrl | Optional - depends on MLP template. |image| Width:
      750 pixels, height: 1624 pixels, size: less than 300 kB, type: png, gif,
      or jpg|

      | barcodeValue | Optional - depends on MLP template. |text| Alphanumeric
      string. We will use CODE-128 format 1-D barcode. |

      | barcodeDisplayValue | Optional - defaults to true. Otherwise, use false
      |text| Indicates whether the barcode value is shown below the barcode
      image|

      | barcodeHeight| Optional| text||

      | barcodeMargin| Optional| text||

      | barcodeWidth| Optional| text||

      | barcodeLineColor|Optional - each template has it's own default value|
      text|  Indicate the color of bar code. Use a color name(eg. 'red',
      'green'), or a hex value(eg. '#F0F8FF') |

      | pageText | |html| For personalisation, use the following format: “Hi
      ${firstName}, thanks for visiting…”|

      | pageTextColor|Optional - each template has it's own default value|
      text|  Indicate the color of page text. Use a color name(eg. 'red',
      'green'), or a hex value(eg. '#F0F8FF') |

      | imageHeaderUrl | Optional - depends on MLP template |image| Width: 750
      pixels, height: 375 pixels, size: less than 300 kB, type: png, gif, or
      jpg.|

      | headline | |text| For personalisation, use the following format: “Hi
      ${firstName}, thanks for visiting…”. Specifications: 60 characters or less
      recommended|

      | headlineColor|Optional - each template has it's own default value|
      text|  Indicate the color of headline. Use a color name(eg. 'red',
      'green'), or a hex value(eg. '#F0F8FF') |

      | pageTitle | |text| HTML page title shown on browser tab. Specifications:
      60 characters or less recommended.|

      | imageLogoUrl |Optional |image| Specifications: width: 300 pixels,
      height: 120 pixels, size: less than 300 kB, type: png, gif, or jpg|

      | logoLink | Optional|url| For personalisation, use the following format:
      “https://example.com/?cid=${customerId}”|

      | primaryButtonLink | |url| For personalisation, use the following format:
      “https://example.com/?cid=${customerId}”|

      | primaryButtonText | |text| For personalisation, use the following
      format: “${firstName}, shop now”. Specifications: 36 characters or less
      recommended |

      | primaryButtonTextColor|Optional - each template has it's own default
      value| text|  Indicate the color of primary button text. Use a color
      name(eg. 'red', 'green'), or a hex value(eg. '#F0F8FF') |

      | primaryButtonBackgroundColor|Optional - each template has it's own
      default value| text|  Indicate the background color of primary button. Use
      a color name(eg. 'red', 'green'), or a hex value(eg. '#F0F8FF') |

      | secondaryButtonLink | Optional - depends on MLP template |url| For
      personalisation, use the following format:
      “https://example.com/?cid=${customerId}”|

      | secondaryButtonText | Optional - depends on MLP template |text| For
      personalisation, use the following format: “Hi ${firstName}, thanks for
      visiting…”. Specifications: 36 characters or less recommended |

      | secondaryButtonTextColor|Optional - each template has it's own default
      value| text|  Indicate the color of the secondary button text. Use a color
      name(eg. 'red', 'green'), or a hex value(eg. '#F0F8FF') |

      | secondaryButtonBackgroundColor|Optional - each template has it's own
      default value| text|  Indicate the background color of secondary button.
      Use a color name(eg. 'red', 'green'), or a hex value(eg. '#F0F8FF') |

      | fontFamilyURL1 | Optional - each template has it's own default
      value|url| Indicate the url of font family, those font family can be used
      in other property(eg. `headlineFontFamily`)|

      | fontFamilyURL2 | Optional - each template has it's own default
      value|url| Indicate the url of font family, those font family can be used
      in other property(eg. `headlineFontFamily`)|

      | fontFamilyURL3 | Optional - each template has it's own default
      value|url| Indicate the url of font family, those font family can be used
      in other property(eg. `headlineFontFamily`)|

      | pageTextFontFamily | |text| Specify the font family of page text |

      | headlineFontFamily | |text| Specify the font family of headline text |

      | buttonFontFamily | |text| Specify the font family of button text |


