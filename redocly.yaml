apis:
  engage:
    root: spec/openapi.yaml

plugins:
  - './plugins/vocabulary.mjs'

extends:
  - recommended

rules:
  no-server-trailing-slash: warn
  no-path-trailing-slash: warn
  no-enum-type-mismatch: warn
  security-defined: warn
  vocabulary/controlled-terms: warn

openapi:
  theme:
    colors:
      primary:
        main: '#32329f'
