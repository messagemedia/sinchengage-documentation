name: CI

on:
  push:
    branches:
      - main
      # Temporary: remove before merge to main
      - feature-MAPI-2218-update-customer-facing-api-documentation
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build documentation
        run: npm run build

      - name: Validate OpenAPI definition
        run: npm test

      - name: Upload Pages artifact
        # Temporary: publish from feature branch until merge to main (remove before merge)
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/feature-MAPI-2218-update-customer-facing-api-documentation'
        # Production: publish only on main (restore before merge)
        # if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')
        uses: actions/upload-pages-artifact@v3
        with:
          path: web_deploy

  deploy:
    # Temporary: publish from feature branch until merge to main (remove before merge)
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/feature-MAPI-2218-update-customer-facing-api-documentation'
    # Production: publish only on main (restore before merge)
    # if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
